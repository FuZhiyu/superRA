name: Render pdfs

on:
  pull_request:
    paths:
      - 'Paper/**/*.tex'
      - 'Paper/**/*.bib'
      - 'Paper/**/*.cls'
      - 'Paper/**/*.sty'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed TeX files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          # Only consider TeX files under Paper/
          files: |
            Paper/**/*.tex

      - name: Find root TeX files to compile
        if: steps.changed-files.outputs.all_changed_files_count != '0'
        id: sanitize-tex
        run: |
          # Write changed files (space-separated by default) to a file, one per line
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$f" >> _files.list
          done

          # Remove ANSI escape codes and trim whitespace; keep only existing .tex files
          sanitize() { sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g'; }
          sanitized=$(sanitize < _files.list | awk '{gsub(/^\s+|\s+$/,""); print}' | awk '/\.tex$/ {print}' | while IFS= read -r f; do [ -n "$f" ] && [ -f "$f" ] && printf "%s\n" "$f"; done)

          if [ -z "$sanitized" ]; then
            echo "list=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For each changed tex file, find the root tex file by searching up the directory tree
          # A root tex file contains \begin{document}
          root_files=""
          processed_dirs=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            dir=$(dirname "$f")
            # Skip if we already processed this directory
            if echo "$processed_dirs" | grep -qF "$dir"; then
              continue
            fi
            processed_dirs=$(printf "%s\n%s" "$processed_dirs" "$dir")

            # Search current directory and parent directories for root tex files
            search_dir="$dir"
            found_root=""
            while [ -n "$search_dir" ] && [ "$search_dir" != "." ]; do
              for texfile in "$search_dir"/*.tex; do
                [ -f "$texfile" ] || continue
                if grep -q '\\begin{document}' "$texfile"; then
                  root_files=$(printf "%s\n%s" "$root_files" "$texfile")
                  found_root="yes"
                fi
              done
              # If we found root files in this directory, stop searching upward
              [ -n "$found_root" ] && break
              # Move to parent directory
              search_dir=$(dirname "$search_dir")
            done
          done <<< "$sanitized"

          # Remove leading newline and duplicates
          root_files=$(echo "$root_files" | sed '/^$/d' | sort -u)

          if [ -z "$root_files" ]; then
            echo "list=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "list<<EOF"
            printf "%s\n" "$root_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install TeX Live
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        uses: zauguin/install-texlive@v3
        with:
          packages: |
            scheme-basic
            latexmk
            biber
            biblatex
            biblatex-apa
            collection-fontsrecommended
            collection-luatex
            collection-latexrecommended
            collection-bibtexextra
            appendix
            epsf
            tikzmark
            spath3
            texfindpkg
            beamertheme-metropolis

      - name: Install missing packages dynamically
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        run: |
          files="${{ steps.sanitize-tex.outputs.list }}"
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            # Extract package names from \usepackage commands
            grep -oP '\\usepackage(\[.*?\])?\{\K[^}]+' "$f" 2>/dev/null | \
              tr ',' '\n' | while read pkg; do
                [ -n "$pkg" ] || continue
                # Try to install via texfindpkg (silently fail if already installed or not found)
                texfindpkg install "$pkg.sty" 2>/dev/null || true
              done
          done <<< "$files"

      - name: Compile root LaTeX files (LuaLaTeX + Biber)
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        env:
          # Include repo root in search paths for bib files and other inputs
          BIBINPUTS: ".:${{ github.workspace }}:"
          TEXINPUTS: ".:${{ github.workspace }}:"
        run: |
          files="${{ steps.sanitize-tex.outputs.list }}"
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            dir=$(dirname "$f")
            filename=$(basename "$f")
            echo "=== Compiling $filename in $dir ==="
            cd "$dir"
            latexmk -f -pdf -lualatex -interaction=nonstopmode "$filename"
            cd - > /dev/null
          done <<< "$files"

      - name: Build PDF paths from root TeX files
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        id: pdf-paths
        run: |
          files="${{ steps.sanitize-tex.outputs.list }}"
          pdfs=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            pdfs+="${f%.tex}.pdf\n"
          done <<< "$files"
          {
            echo "paths<<EOF"
            printf "%b" "$pdfs"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Copy PDFs to release directory with unique names
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        id: prepare-release
        run: |
          mkdir -p _release_pdfs
          files="${{ steps.pdf-paths.outputs.paths }}"
          release_files=""
          name_map=""
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            [ -f "$f" ] || continue
            # Create unique name: replace / with _
            unique_name=$(echo "$f" | sed 's|/|_|g')
            cp "$f" "_release_pdfs/$unique_name"
            release_files+="_release_pdfs/$unique_name"$'\n'
            name_map+="$f|$unique_name"$'\n'
          done <<< "$files"
          {
            echo "files<<EOF"
            printf "%s" "$release_files"
            echo "EOF"
            echo "name_map<<EOF"
            printf "%s" "$name_map"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Delete old PR preview releases
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Delete old releases for this PR
            const oldPrReleases = releases.filter(r =>
              r.tag_name.startsWith(`pr-${prNumber}-`) && r.prerelease
            );

            for (const release of oldPrReleases) {
              console.log(`Deleting old release: ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (e) {
                console.log(`Tag already deleted: ${release.tag_name}`);
              }
            }

      - name: Upload PDFs to temporary release
        if: steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          name: "PR #${{ github.event.pull_request.number }} PDF Preview"
          body: "Automated PDF preview for PR #${{ github.event.pull_request.number }}"
          draft: false
          prerelease: true
          files: ${{ steps.prepare-release.outputs.files }}

      - name: Post PDF links to PR
        if: github.event_name == 'pull_request' && steps.changed-files.outputs.all_changed_files_count != '0' && steps.sanitize-tex.outputs.list != ''
        env:
          NAME_MAP: ${{ steps.prepare-release.outputs.name_map }}
        uses: actions/github-script@v7
        with:
          script: |
            const nameMap = process.env.NAME_MAP.trim().split('\n').filter(l => l);
            const tagName = `pr-${{ github.event.pull_request.number }}-${{ github.sha }}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let body = '## 📄 Compiled PDFs\n\n';
            body += '| File | Download |\n';
            body += '|------|----------|\n';

            for (const line of nameMap) {
              const [originalPath, releaseName] = line.split('|');
              const downloadUrl = `${context.serverUrl}/${owner}/${repo}/releases/download/${tagName}/${releaseName}`;
              body += `| \`${originalPath}\` | [📥 Download](${downloadUrl}) |\n`;
            }

            body += `\n_Updated: ${{ github.event.pull_request.head.sha }}_`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
            });

            const header = '<!-- pdf-artifacts -->';
            const existingComment = comments.find(c => c.body.includes(header));
            const fullBody = header + '\n' + body;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
