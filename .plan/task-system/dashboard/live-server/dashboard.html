<style>
/* ── Light / Dark tokens ── */
:root {
  --font-display: 'Source Serif 4', 'Georgia', serif;
  --font-mono: 'IBM Plex Mono', 'Menlo', monospace;

  --bg:        #faf9f7;
  --bg-alt:    #f2f0ec;
  --bg-card:   #ffffff;
  --bg-hover:  #edeae4;
  --text:      #2c2a25;
  --text-mid:  #6b6560;
  --text-mute: #9e9890;
  --border:    #ddd8d0;
  --border-lt: #eae6df;
  --accent:    #b44d2d;
  --accent-hover: #953f24;
  --accent-soft: rgba(180,77,45,0.08);

  --tree-line: #d4cfc7;

  --st-ns:     #e8e5df;  --st-ns-t:   #8a857d;
  --st-ip:     #d6e6f5;  --st-ip-t:   #2a6496;
  --st-impl:   #f5edd4;  --st-impl-t: #8a6d1b;
  --st-rev:    #f5d9d4;  --st-rev-t:  #9b3228;
  --st-ok:     #d4e8d4;  --st-ok-t:   #2d6a30;

  --progress-bg:    #e8e5df;
  --progress-fill:  #6b9e6d;

  --kanban-bg: var(--bg-alt);
  --kanban-card-bg: var(--bg-card);
  --kanban-card-border: var(--border);

  --shadow-sm: 0 1px 2px rgba(44,42,37,0.06);
  --shadow-md: 0 2px 8px rgba(44,42,37,0.08);
}

[data-theme="dark"] {
  --bg:        #1c1b19;
  --bg-alt:    #252320;
  --bg-card:   #2c2a27;
  --bg-hover:  #353330;
  --text:      #e0ddd7;
  --text-mid:  #a09b93;
  --text-mute: #706b63;
  --border:    #3d3a35;
  --border-lt: #33302c;
  --accent:    #e07850;
  --accent-hover: #f09070;
  --accent-soft: rgba(224,120,80,0.10);

  --tree-line: #3d3a35;

  --st-ns:     #33312e;  --st-ns-t:   #9e9890;
  --st-ip:     #1f3248;  --st-ip-t:   #7ab0e0;
  --st-impl:   #3a3018;  --st-impl-t: #d4b64a;
  --st-rev:    #3e201c;  --st-rev-t:  #e08070;
  --st-ok:     #1e3320;  --st-ok-t:   #7ec080;

  --progress-bg:    #33312e;
  --progress-fill:  #5a9a5c;

  --kanban-bg: var(--bg-alt);
  --kanban-card-bg: var(--bg-card);
  --kanban-card-border: var(--border);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
}

/* ── Reset + base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header bar ── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 16px;
  padding: 10px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.header-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  white-space: nowrap;
}
.header-stats {
  display: flex; align-items: center; gap: 14px;
  margin-left: 8px;
  font-size: 12px; color: var(--text-mute);
}
.header-stats strong { color: var(--text-mid); font-weight: 600; }

/* Progress bar */
.progress-track {
  width: 120px; height: 6px;
  background: var(--progress-bg);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--progress-fill);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.header-spacer { flex: 1; }

/* Controls */
.header-controls {
  display: flex; align-items: center; gap: 6px;
}
.hc-btn, .hc-select {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s ease;
}
.hc-btn:hover, .hc-select:hover { background: var(--bg-hover); color: var(--text); }
.hc-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.hc-search {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  width: 180px;
  transition: border-color 0.15s ease;
}
.hc-search:focus {
  outline: none;
  border-color: var(--accent);
}
.hc-search::placeholder { color: var(--text-mute); }
.theme-toggle {
  font-size: 16px; line-height: 1;
  background: none; border: none;
  color: var(--text-mute); cursor: pointer;
  padding: 4px;
  transition: color 0.15s ease;
}
.theme-toggle:hover { color: var(--text); }

/* ── Main content area ── */
.main-content {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 24px 60px;
}

/* ── Tree View ── */
.task-tree { }
.task-node {
  position: relative;
}
.task-node + .task-node { margin-top: 1px; }

/* Tree connector lines */
.task-children {
  position: relative;
  margin-left: 20px;
  padding-left: 16px;
  border-left: 1px solid var(--tree-line);
}

/* ── Task row (always visible) ── */
.task-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.task-row:hover { background: var(--bg-hover); }

.task-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  font-size: 10px;
  color: var(--text-mute);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.task-toggle.expanded { transform: rotate(90deg); }
.task-toggle.leaf { visibility: hidden; }

.task-slug {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}
.task-title-text {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 400;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* Status badge */
.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.03em;
  padding: 1px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-not-started  { background: var(--st-ns);   color: var(--st-ns-t);   }
.badge-in-progress  { background: var(--st-ip);   color: var(--st-ip-t);   }
.badge-implemented  { background: var(--st-impl); color: var(--st-impl-t); }
.badge-revise       { background: var(--st-rev);  color: var(--st-rev-t);  }
.badge-approved     { background: var(--st-ok);   color: var(--st-ok-t);   }

.task-progress {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  flex-shrink: 0;
}

/* ── Task body (expanded) ── */
.task-body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.2s ease;
  padding: 0 8px 0 30px;
}
.task-body.open {
  max-height: 5000px;
  opacity: 1;
  padding: 4px 8px 8px 30px;
}

/* Section toggles inside task body */
.section-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  margin: 2px 0;
  border-radius: 3px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.section-toggle:hover { background: var(--bg-hover); }
.section-icon {
  font-size: 9px;
  color: var(--text-mute);
  transition: transform 0.2s ease;
  width: 12px;
  text-align: center;
}
.section-icon.expanded { transform: rotate(90deg); }
.section-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mid);
}
.section-preview {
  font-size: 11px;
  color: var(--text-mute);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 400px;
}

.section-content {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.3s ease, opacity 0.2s ease;
  padding-left: 20px;
}
.section-content.open {
  max-height: 8000px;
  opacity: 1;
  padding-bottom: 4px;
}

/* Rendered markdown inside sections */
.rendered-md {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  padding: 6px 0;
}
.rendered-md h1, .rendered-md h2, .rendered-md h3 {
  font-family: var(--font-display);
  font-weight: 600;
  margin: 12px 0 6px;
}
.rendered-md h1 { font-size: 16px; }
.rendered-md h2 { font-size: 14px; }
.rendered-md h3 { font-size: 13px; }
.rendered-md p { margin: 4px 0; }
.rendered-md ul, .rendered-md ol { padding-left: 18px; margin: 4px 0; }
.rendered-md li { margin: 2px 0; }
.rendered-md pre {
  background: var(--bg-alt);
  padding: 10px 12px;
  border-radius: 4px;
  overflow-x: auto;
  margin: 6px 0;
  border: 1px solid var(--border-lt);
}
.rendered-md code {
  font-family: var(--font-mono);
  font-size: 12px;
}
.rendered-md p code, .rendered-md li code {
  background: var(--bg-alt);
  padding: 1px 4px;
  border-radius: 2px;
}
.rendered-md blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 12px;
  margin: 6px 0;
  background: var(--accent-soft);
  border-radius: 0 3px 3px 0;
}
.rendered-md table {
  border-collapse: collapse;
  margin: 6px 0;
  font-size: 12px;
}
.rendered-md th, .rendered-md td {
  border: 1px solid var(--border);
  padding: 4px 8px;
  text-align: left;
}
.rendered-md th { background: var(--bg-alt); font-weight: 600; }

/* Metadata pills inside task body */
.task-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border-lt);
}
.meta-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  background: var(--bg-alt);
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.meta-pill strong { color: var(--text-mid); font-weight: 600; }

/* ── DAG view ── */
.dag-container {
  padding: 16px 0;
}
.dag-controls {
  font-family: var(--font-display);
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--text-mid);
}
.dag-controls strong { color: var(--text); }

/* ── Kanban view ── */
.kanban {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  overflow-x: auto;
  min-height: 400px;
}
.kanban-col {
  min-width: 200px;
  flex: 1;
  background: var(--kanban-bg);
  border-radius: 6px;
  padding: 10px;
}
.kanban-col-header {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 2px solid var(--border);
  color: var(--text-mid);
}
.kanban-col-header .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mute);
  font-weight: 400;
}
.kanban-card {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: var(--kanban-card-bg);
  border: 1px solid var(--kanban-card-border);
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.kanban-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.kanban-card-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
}
.kanban-card-path {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  margin-top: 3px;
}

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.task-node { animation: fadeIn 0.15s ease both; }
.task-tree > .task-node:nth-child(1)  { animation-delay: 0.02s; }
.task-tree > .task-node:nth-child(2)  { animation-delay: 0.04s; }
.task-tree > .task-node:nth-child(3)  { animation-delay: 0.06s; }
.task-tree > .task-node:nth-child(4)  { animation-delay: 0.08s; }
.task-tree > .task-node:nth-child(5)  { animation-delay: 0.10s; }
.task-tree > .task-node:nth-child(6)  { animation-delay: 0.12s; }
.task-tree > .task-node:nth-child(7)  { animation-delay: 0.14s; }
.task-tree > .task-node:nth-child(8)  { animation-delay: 0.16s; }
.task-tree > .task-node:nth-child(9)  { animation-delay: 0.18s; }
.task-tree > .task-node:nth-child(10) { animation-delay: 0.20s; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="header-title" id="plan-title">Plan Dashboard</span>
  <div class="header-stats">
    <span id="stat-tasks"></span>
    <span id="stat-approved"></span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="stat-updated"></span>
  </div>
  <div class="header-spacer"></div>
  <div class="header-controls">
    <input type="text" class="hc-search" id="search-box" placeholder="Search tasks..." oninput="applyFilters()">
    <select class="hc-select" id="filter-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="not-started">not-started</option>
      <option value="in-progress">in-progress</option>
      <option value="implemented">implemented</option>
      <option value="revise">revise</option>
      <option value="approved">approved</option>
    </select>
    <button class="hc-btn active" id="btn-tree" onclick="showView('tree')">Tree</button>
    <button class="hc-btn" id="btn-dag" onclick="showView('dag')">DAG</button>
    <button class="hc-btn" id="btn-kanban" onclick="showView('kanban')">Kanban</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">&#9681;</button>
  </div>
</div>

<!-- ── Content ── -->
<div class="main-content">
  <div id="view-tree" class="task-tree"></div>
  <div id="view-dag" class="dag-container hidden"></div>
  <div id="view-kanban" class="kanban hidden"></div>
</div>

  "body": "\n## Objective\n\nReplace the static single-file HTML dashboard with a live-updating server-based dashboard. Stack: FastAPI + Jinja2 + htmx + watchfiles, all resolved at runtime via `uv run --with`.\n\n**Design decisions (from brainstorm):**\n- Dynamic loading: only the expanded subtree's data is fetched, not the entire tree\n- Single-page feel: htmx swaps HTML fragments in-place on expand/collapse, no full page reloads\n- Live reload: watchfiles monitors `.plan/` for changes, pushes SSE events, htmx swaps updated fragments\n- Zero install friction: `uv run --with fastapi,uvicorn,jinja2,watchfiles` resolves deps at runtime\n- Preserve existing features: tree view, DAG (Mermaid), kanban, dark/light mode, search/filter, status summary bar\n\n**Tech stack:**\n- `fastapi` + `uvicorn` \u2014 async HTTP server\n- `jinja2` \u2014 server-side HTML templates\n- `watchfiles` \u2014 OS-native filesystem watcher (FSEvents/inotify)\n- `htmx` (CDN) \u2014 dynamic HTML fragment swapping, SSE support\n- `mermaid` (CDN) \u2014 DAG rendering\n- `markdown-it` (CDN) \u2014 markdown rendering in task bodies\n\n**Architecture:**\n- Server reads `.plan/` tree on startup, serves HTML fragments per task node\n- Expand a task \u2192 `hx-get=\"/task/\u003cpath\u003e\"` fetches rendered children\n- SSE endpoint `/events` pushes `task-updated` events when watchfiles detects changes\n- Each task node declares `sse-swap=\"task:\u003cpath\u003e\"` to auto-update on change\n",

      "body": "\n## Objective\n\nProvide a single-command entry point for launching the live dashboard, with zero-install setup via `uv run --with`.\n\n**CLI interface:**\n- `plan-dashboard serve [--root .plan/] [--port 8080] [--no-open]`\n- `--root` \u2014 path to the `.plan/` directory (default: `.plan/` in cwd)\n- `--port` \u2014 server port (default: 8080)\n- `--no-open` \u2014 skip auto-opening the browser\n- On launch: start uvicorn, print URL, open browser via `webbrowser.open()`\n\n**uv integration:**\n- The script should work as `uv run --with fastapi,uvicorn,jinja2,watchfiles plan_dashboard.py serve`\n- Add inline script metadata (PEP 723) at the top of `plan_dashboard.py` so `uv run plan_dashboard.py serve` auto-resolves dependencies without `--with`:\n  ```python\n  # /// script\n  # requires-python = \"\u003e=3.10\"\n  # dependencies = [\"fastapi\", \"uvicorn\", \"jinja2\", \"watchfiles\"]\n  # ///\n  ```\n- This makes the launch command simply: `uv run plan_dashboard.py serve`\n\n**Backward compatibility:**\n- Keep the existing `plan_dashboard.py generate` command for static HTML generation as a fallback\n- The `serve` subcommand is additive \u2014 doesn't break existing usage\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**CLI subcommands:**\n- `serve [--root .plan/] [--port 8080] [--no-open]` \u2014 starts FastAPI via `uvicorn.run()`, auto-opens browser after 1s delay unless `--no-open`\n- `generate --plan-root PATH [--output PATH]` \u2014 backward-compatible static HTML generation, preserves the full `DASHBOARD_HTML` template from the old script\n\n**PEP 723 inline metadata:**\n```python\n# /// script\n# requires-python = \"\u003e=3.10\"\n# dependencies = [\"fastapi\", \"uvicorn[standard]\", \"jinja2\", \"watchfiles\", \"pyyaml\"]\n# ///\n```\n\nLaunch: `uv run skills/task-system/scripts/plan_dashboard.py serve`\n",

          "body": "\n## Objective\n\nDefine the sidecar YAML format for comments and implement the server-side routes for creating, listing, and resolving comments.\n\n**Sidecar format** \u2014 `comments.yaml` next to each `task.md`:\n```yaml\n- id: 1\n  author: Julie\n  timestamp: 2026-05-24T10:30:00\n  resolved: false\n  anchor:\n    section: \"Objective\"\n    block_index: 2\n    text_preview: \"The server should work as\"\n  body: \"Do we really need configurable root? YAGNI.\"\n```\n\n**Fields:**\n- `id` \u2014 auto-incrementing integer within the file\n- `author` \u2014 user name (configurable, default from git config)\n- `timestamp` \u2014 ISO 8601\n- `resolved` \u2014 boolean, toggleable\n- `anchor.section` \u2014 the `## Heading` this comment is attached to\n- `anchor.block_index` \u2014 0-indexed block within the section (paragraph, list item, code block, etc.)\n- `anchor.text_preview` \u2014 first ~60 chars of the block text, used for fuzzy re-anchoring when content shifts\n- `body` \u2014 comment text (plain text or markdown)\n\n**Server routes:**\n- `POST /task/{path}/comment` \u2014 create a comment (body: `{section, block_index, text_preview, body}`)\n- `GET /task/{path}/comments` \u2014 list all comments for a task (JSON)\n- `PATCH /task/{path}/comment/{id}` \u2014 toggle resolved status\n- `DELETE /task/{path}/comment/{id}` \u2014 delete a comment\n\n**Anchor re-resolution:**\n- On read, verify `block_index` still matches `text_preview`\n- If mismatch, scan blocks in the section for a fuzzy match (substring containment) and update the index\n- If no match found, mark the comment as `orphaned: true` and render it at the section level\n\n## Results\n\nImplemented in [`_comments.py`](../../../../../skills/task-system/scripts/_comments.py):\n\n- `Comment` / `CommentAnchor` dataclasses with `orphaned` as a runtime-only flag (not persisted to YAML)\n- `load_comments` / `save_comments` \u2014 YAML sidecar I/O with `yaml.safe_load` / `yaml.dump`\n- `add_comment` \u2014 auto-increment ID, git author detection, ISO timestamp\n- `resolve_comment` \u2014 toggle resolved boolean\n- `delete_comment` \u2014 remove by ID\n- `split_into_blocks` \u2014 handles paragraphs, fenced code blocks, and grouped list items\n- `resolve_anchors` \u2014 re-resolves anchors against current body via `parse_body_sections`, with fuzzy substring fallback and orphan marking\n\nServer routes (`POST`, `GET`, `PATCH`, `DELETE`) are implemented in the sibling `server` task's `task_serve.py` and call these functions directly.\n",

      "body": "\n## Objective\n\nWire up filesystem watching and Server-Sent Events so the dashboard updates automatically when `.plan/` files change on disk.\n\n**Watcher:**\n- Use `watchfiles.awatch()` to monitor `.plan/` recursively for `task.md` changes\n- Run the watcher as a FastAPI background task (lifespan event)\n- On change: identify the changed task path, re-parse that single `task.md`, update the in-memory index\n- Debounce rapid changes (agents rewriting a file may trigger multiple events) \u2014 ~200ms window\n\n**SSE endpoint:**\n- `GET /events` returns a `text/event-stream` response\n- Each connected browser holds an open SSE connection\n- When a task changes, broadcast an SSE event: `event: task-updated\\ndata: \u003crendered HTML fragment for the changed task\u003e\\n\\n`\n- htmx's SSE extension picks this up and swaps the fragment into the matching `sse-swap` target\n- Also broadcast `event: summary-updated\\ndata: \u003crendered summary bar\u003e\\n\\n` so the status counts refresh\n\n**Edge cases:**\n- New task directory created \u2192 add to index, broadcast parent re-render (new child appears)\n- Task directory deleted \u2192 remove from index, broadcast parent re-render\n- SSE reconnection: browser auto-retries (SSE built-in), server should handle multiple concurrent connections via an async broadcast channel\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**Watcher:** `_watch_plan_root()` uses `watchfiles.awatch(PLAN_ROOT)` as a background task started in the FastAPI lifespan. Filters for `task.md` and `comments.yaml` only. 200ms debounce via `asyncio.sleep(0.2)` after receiving changes.\n\n**SSE broadcast:** `_broadcast(event, data)` sends SSE-formatted messages to all connected clients via `set[asyncio.Queue]`. Each `/events` connection gets its own queue (maxsize=256). Dead queues (full) are pruned on broadcast.\n\n**Change handling:**\n- Modified `task.md` / `comments.yaml` -\u003e `rebuild_task(path)` + broadcast `task-updated` (HTML fragment) + `summary-updated`\n- New/deleted `task.md` -\u003e `rebuild_tree()` + broadcast `full-reload`\n\n**SSE events emitted:**\n- `event: task-updated` with `data: {\"path\": \"...\", \"html\": \"...\"}`\n- `event: summary-updated` with `data: \u003crendered summary HTML\u003e`\n- `event: full-reload` with `data: {}`\n\n",
      "objective": "\nWire up filesystem watching and Server-Sent Events so the dashboard updates automatically when `.plan/` files change on disk.\n\n**Watcher:**\n- Use `watchfiles.awatch()` to monitor `.plan/` recursively for `task.md` changes\n- Run the watcher as a FastAPI background task (lifespan event)\n- On change: identify the changed task path, re-parse that single `task.md`, update the in-memory index\n- Debounce rapid changes (agents rewriting a file may trigger multiple events) \u2014 ~200ms window\n\n**SSE endpoint:**\n- `GET /events` returns a `text/event-stream` response\n- Each connected browser holds an open SSE connection\n- When a task changes, broadcast an SSE event: `event: task-updated\\ndata: \u003crendered HTML fragment for the changed task\u003e\\n\\n`\n- htmx's SSE extension picks this up and swaps the fragment into the matching `sse-swap` target\n- Also broadcast `event: summary-updated\\ndata: \u003crendered summary bar\u003e\\n\\n` so the status counts refresh\n\n**Edge cases:**\n- New task directory created \u2192 add to index, broadcast parent re-render (new child appears)\n- Task directory deleted \u2192 remove from index, broadcast parent re-render\n- SSE reconnection: browser auto-retries (SSE built-in), server should handle multiple concurrent connections via an async broadcast channel\n",
      "results": "\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**Watcher:** `_watch_plan_root()` uses `watchfiles.awatch(PLAN_ROOT)` as a background task started in the FastAPI lifespan. Filters for `task.md` and `comments.yaml` only. 200ms debounce via `asyncio.sleep(0.2)` after receiving changes.\n\n**SSE broadcast:** `_broadcast(event, data)` sends SSE-formatted messages to all connected clients via `set[asyncio.Queue]`. Each `/events` connection gets its own queue (maxsize=256). Dead queues (full) are pruned on broadcast.\n\n**Change handling:**\n- Modified `task.md` / `comments.yaml` -\u003e `rebuild_task(path)` + broadcast `task-updated` (HTML fragment) + `summary-updated`\n- New/deleted `task.md` -\u003e `rebuild_tree()` + broadcast `full-reload`\n\n**SSE events emitted:**\n- `event: task-updated` with `data: {\"path\": \"...\", \"html\": \"...\"}`\n- `event: summary-updated` with `data: \u003crendered summary HTML\u003e`\n- `event: full-reload` with `data: {}`\n\n",

      "body": "\n## Objective\n\nBuild the FastAPI application that serves the dashboard. Reuse the existing task-tree parser from `plan_dashboard.py` (or `plan_task_io.py`).\n\n**Routes:**\n- `GET /` \u2014 serves the full dashboard page (base template + top-level task skeleton)\n- `GET /task/{path:path}` \u2014 returns an HTML fragment for a task node and its direct children (htmx partial)\n- `GET /events` \u2014 SSE endpoint for live updates (see `live-reload` subtask)\n- `GET /static/{file}` \u2014 serves shared CSS/JS if extracted (optional)\n\n**Data layer:**\n- On startup, walk `.plan/` and parse `task.md` files into the existing task-tree data structure\n- Keep an in-memory task index (`dict[path, TaskNode]`) for fast lookups\n- On file-change events (from the watcher), re-parse only the changed `task.md` and update the index\n- Parse task body sections (objective, results, decisions, review notes) for section-level rendering\n\n**Key constraints:**\n- The server module should be importable and runnable via `uvicorn` programmatically\n- Reuse existing `plan_task_io.py` parsing logic \u2014 don't duplicate the YAML frontmatter parser\n- Task tree root is configurable (default: `.plan/` in cwd) so subtrees can be served independently\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**Routes implemented:**\n- `GET /` \u2014 renders `base.html` with `root_task`, `all_tasks`, `project_root`\n- `GET /task/{path:path}` \u2014 renders `task_children.html` fragment for htmx expand\n- `GET /events` \u2014 SSE endpoint with `text/event-stream`, per-client `asyncio.Queue` broadcast\n- `GET /files/{path:path}` \u2014 serves project files for image embeds (path-traversal guarded)\n- `POST /api/task/{path:path}/comment` \u2014 create comment\n- `GET /api/task/{path:path}/comments` \u2014 list comments\n- `PATCH /api/task/{path:path}/comment/{comment_id}` \u2014 toggle resolved\n- `DELETE /api/task/{path:path}/comment/{comment_id}` \u2014 delete comment\n\n**Data layer:**\n- `rebuild_tree()` \u2014 full re-walk, builds `_task_index: dict[str, Task]`\n- `rebuild_task(path)` \u2014 re-parse single task.md, patch in-tree, update index\n- `_find_task(path)` \u2014 O(1) lookup\n\n**Note:** Comment routes use `/api/` prefix instead of the spec's `/task/{path}/comments` to avoid ambiguity with FastAPI's greedy `{path:path}` parameter. The catch-all `/task/{path:path}` route is registered last.\n\n## Decisions\n\n- Comment routes moved to `/api/task/...` prefix. The `{path:path}` parameter in FastAPI is greedy and would match `/task/server/comments` as `path=\"server/comments\"` before the more specific comment route. Using an `/api/` prefix avoids this ambiguity cleanly.\n- `_comments.py` import is wrapped in try/except so the server works even if the comments module is not yet available.\n- Jinja2 environment is lazy-initialized (not at import time) so the module can be imported for testing without templates present.\n",

s, typography) from `dashboard.html`\n- Tree connector lines via `border-left` (existing pattern)\n- Progressive disclosure: title row \u2192 children + section toggles \u2192 rendered markdown\n- Search and status filter in the header, using `hx-get` with query params to fetch filtered results\n- Breadcrumb showing current view scope (useful when serving a subtree)\n\n**htmx patterns:**\n- `hx-get=\"/task/{path}\"` on expand toggle \u2014 fetches children fragment\n- `hx-target=\"#{path}-children\"` \u2014 swaps into the children container\n- `hx-swap=\"innerHTML\"` \u2014 replace children content\n- `hx-ext=\"sse\"` + `sse-connect=\"/events\"` on the main container\n- `sse-swap=\"task:{path}\"` on each task node \u2014 auto-update on change\n\n**Markdown link resolution:**\n- Relative file paths in markdown links (`[text](path/to/file.py:42)`) rewrite to `vscode://file/{absolute_path}:42` URIs \u2014 click to open in VSCode at that line\n- Heuristic: if href doesn't start with `http://`, `https://`, or `#`, treat as a file path\n- Image embeds (`![alt](path/to/fig.png)`) rewrite `src` to `/files/path/to/fig.png`, served by a `StaticFiles` mount on the project root\n",

const md = window.markdownit({ html: false, linkify: true });
let currentView = 'tree';
const taskByPath = {};
const expandedTasks = new Set();
const expandedSections = new Set();

/* ── Helpers ── */

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sanitizeMermaid(s) {
  return s.replace(/"/g, "'").replace(/[\[\](){}]/g, '');
}

function flattenTasks(task) {
  let r = [task];
  for (const c of task.children) r = r.concat(flattenTasks(c));
  return r;
}

function buildIndex(task) {
  taskByPath[task.path] = task;
  for (const c of task.children) buildIndex(c);
}

function parseBodySections(body) {
  const lines = body.split('\n');
  const sections = [];
  let cur = null;
  for (const line of lines) {
    const m = line.match(/^## (.+)$/);
    if (m) {
      if (cur) sections.push(cur);
      cur = { name: m[1], content: '' };
    } else if (cur) {
      cur.content += line + '\n';
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

function sectionPreview(content) {
  const stripped = content.replace(/\n/g, ' ').replace(/[#*`>\-]/g, '').trim();
  if (!stripped) return '';
  return stripped.length > 80 ? stripped.slice(0, 80) + '...' : stripped;
}

function taskMatches(task, status, search) {
  if (status && task.effective_status !== status) return false;
  if (search && !(task.title || '').toLowerCase().includes(search) &&
      !(task.path || '').toLowerCase().includes(search)) return false;
  return true;
}

function anyDescendantMatches(task, status, search) {
  if (taskMatches(task, status, search)) return true;
  for (const c of task.children) {
    if (anyDescendantMatches(c, status, search)) return true;
  }
  return false;
}

/* ── Init ── */

function init() {
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('dashboard-theme') || 'light');
  mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  buildIndex(TASK_DATA);
  renderSummary();
  renderTree();
}

/* ── Theme ── */

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('dashboard-theme', next);
}

/* ── View switching ── */

function showView(view) {
  currentView = view;
  document.querySelectorAll('.hc-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn-' + view).classList.add('active');
  document.getElementById('view-tree').classList.toggle('hidden', view !== 'tree');
  document.getElementById('view-dag').classList.toggle('hidden', view !== 'dag');
  document.getElementById('view-kanban').classList.toggle('hidden', view !== 'kanban');
  if (view === 'dag') renderDag();
  if (view === 'kanban') renderKanban();
}

/* ── Summary bar ── */

function renderSummary() {
  const all = flattenTasks(TASK_DATA);
  const leaves = all.filter(function(t) { return t.is_leaf; });
  const approved = leaves.filter(function(t) { return t.effective_status === 'approved'; }).length;
  const pct = leaves.length ? Math.round(100 * approved / leaves.length) : 0;

  document.getElementById('plan-title').textContent = TASK_DATA.title || 'Plan Dashboard';
  document.getElementById('stat-tasks').innerHTML =
    '<strong>' + leaves.length + '</strong> tasks, <strong>' + (all.length - leaves.length) + '</strong> groups';
  document.getElementById('stat-approved').innerHTML =
    '<strong>' + approved + '/' + leaves.length + '</strong> approved';
  document.getElementById('progress-fill').style.width = pct + '%';
  const dates = all.map(function(t) { return t.updated; }).filter(Boolean).sort();
  if (dates.length) {
    document.getElementById('stat-updated').textContent = dates[dates.length - 1];
  }
}

/* ── Tree view (recursive expand/collapse) ── */

function renderTree() {
  const root = document.getElementById('view-tree');
  root.innerHTML = '';
  for (var i = 0; i < TASK_DATA.children.length; i++) {
    root.appendChild(renderTaskNode(TASK_DATA.children[i], 0));
  }
}

function renderTaskNode(task, depth) {
  const node = document.createElement('div');
  node.className = 'task-node';
  node.dataset.path = task.path;

  /* ── Row (always visible) ── */
  const row = document.createElement('div');
  row.className = 'task-row';

  const hasExpandable = task.children.length > 0 || (task.body && task.body.trim());
  const toggle = document.createElement('span');
  toggle.className = 'task-toggle' + (hasExpandable ? '' : ' leaf');
  toggle.textContent = '\u25B8';

  const slug = document.createElement('span');
  slug.className = 'task-slug';
  const slugText = task.path ? task.path.split('/').pop() : '';
  slug.textContent = slugText;

  const titleSpan = document.createElement('span');
  titleSpan.className = 'task-title-text';
  titleSpan.textContent = task.title || '';

  const badge = document.createElement('span');
  badge.className = 'badge badge-' + task.effective_status;
  badge.textContent = task.effective_status;

  row.appendChild(toggle);
  if (slugText) row.appendChild(slug);
  row.appendChild(titleSpan);
  row.appendChild(badge);

  if (!task.is_leaf && task.children.length) {
    const approvedCount = task.children.filter(function(c) { return c.effective_status === 'approved'; }).length;
    const prog = document.createElement('span');
    prog.className = 'task-progress';
    prog.textContent = '(' + approvedCount + '/' + task.children.length + ')';
    row.appendChild(prog);
  }

  node.appendChild(row);

  /* ── Body (expandable) ── */
  const body = document.createElement('div');
  body.className = 'task-body';

  const sections = parseBodySections(task.body || '');
  const sectionKeys = ['Objective', 'Results', 'Decisions', 'Review Notes'];
  const shownSections = sections.filter(function(s) { return sectionKeys.indexOf(s.name) >= 0 && s.content.trim(); });
  const otherSections = sections.filter(function(s) { return sectionKeys.indexOf(s.name) < 0 && s.content.trim(); });
  var allSections = shownSections.concat(otherSections);

  for (var si = 0; si < allSections.length; si++) {
    (function(sec) {
      var secKey = task.path + '::' + sec.name;
      var secDiv = document.createElement('div');

      var secToggle = document.createElement('div');
      secToggle.className = 'section-toggle';
      var secIcon = document.createElement('span');
      secIcon.className = 'section-icon';
      secIcon.textContent = '\u25B8';
      var secLabel = document.createElement('span');
      secLabel.className = 'section-label';
      secLabel.textContent = sec.name;
      var secPreview = document.createElement('span');
      secPreview.className = 'section-preview';
      secPreview.textContent = sectionPreview(sec.content);

      secToggle.appendChild(secIcon);
      secToggle.appendChild(secLabel);
      secToggle.appendChild(secPreview);

      var secContent = document.createElement('div');
      secContent.className = 'section-content';
      var rendered = document.createElement('div');
      rendered.className = 'rendered-md';

      secToggle.onclick = function(e) {
        e.stopPropagation();
        var isOpen = secContent.classList.toggle('open');
        secIcon.classList.toggle('expanded', isOpen);
        if (isOpen) {
          expandedSections.add(secKey);
          if (!rendered.innerHTML) {
            rendered.innerHTML = md.render(sec.content);
          }
          secPreview.style.display = 'none';
        } else {
          expandedSections.delete(secKey);
          secPreview.style.display = '';
        }
      };

      secContent.appendChild(rendered);
      secDiv.appendChild(secToggle);
      secDiv.appendChild(secContent);
      body.appendChild(secDiv);
    })(allSections[si]);
  }

  /* Metadata pills */
  var hasMeta = (task.depends_on && task.depends_on.length) ||
                task.script ||
                (task.tags && task.tags.length) ||
                (task.input && task.input.length) ||
                (task.output && task.output.length);
  if (hasMeta) {
    var metaDiv = document.createElement('div');
    metaDiv.className = 'task-meta';
    if (task.depends_on && task.depends_on.length) {
      var pill = document.createElement('span');
      pill.className = 'meta-pill';
      pill.innerHTML = '<strong>depends:</strong> ' + task.depends_on.map(function(d) { return esc(d); }).join(', ');
      metaDiv.appendChild(pill);
    }
    if (task.script) {
      var pill2 = document.createElement('span');
      pill2.className = 'meta-pill';
      pill2.innerHTML = '<strong>script:</strong> ' + esc(task.script);
      metaDiv.appendChild(pill2);
    }
    if (task.tags && task.tags.length) {
      var pill3 = document.createElement('span');
      pill3.className = 'meta-pill';
      pill3.innerHTML = '<strong>tags:</strong> ' + task.tags.map(function(t) { return esc(t); }).join(', ');
      metaDiv.appendChild(pill3);
    }
    if (task.input && task.input.length) {
      var pill4 = document.createElement('span');
      pill4.className = 'meta-pill';
      pill4.innerHTML = '<strong>in:</strong> ' + task.input.map(function(x) { return esc(x); }).join(', ');
      metaDiv.appendChild(pill4);
    }
    if (task.output && task.output.length) {
      var pill5 = document.createElement('span');
      pill5.className = 'meta-pill';
      pill5.innerHTML = '<strong>out:</strong> ' + task.output.map(function(x) { return esc(x); }).join(', ');
      metaDiv.appendChild(pill5);
    }
    body.appendChild(metaDiv);
  }

  node.appendChild(body);

  /* ── Children (recursive) ── */
  if (task.children.length) {
    var childrenDiv = document.createElement('div');
    childrenDiv.className = 'task-children';
    if (!expandedTasks.has(task.path)) childrenDiv.style.display = 'none';
    for (var ci = 0; ci < task.children.length; ci++) {
      childrenDiv.appendChild(renderTaskNode(task.children[ci], depth + 1));
    }
    node.appendChild(childrenDiv);
  }

  /* Restore expanded state on re-render */
  if (expandedTasks.has(task.path)) {
    toggle.classList.add('expanded');
    body.classList.add('open');
  }

  /* ── Click handler ── */
  (function(taskRef, toggleEl, bodyEl, nodeEl) {
    row.onclick = function(e) {
      e.stopPropagation();
      var isExpanded = expandedTasks.has(taskRef.path);
      if (isExpanded) {
        expandedTasks.delete(taskRef.path);
        toggleEl.classList.remove('expanded');
        bodyEl.classList.remove('open');
        var ch = nodeEl.querySelector(':scope > .task-children');
        if (ch) ch.style.display = 'none';
      } else {
        expandedTasks.add(taskRef.path);
        toggleEl.classList.add('expanded');
        bodyEl.classList.add('open');
        var ch2 = nodeEl.querySelector(':scope > .task-children');
        if (ch2) ch2.style.display = '';
      }
    };
  })(task, toggle, body, node);

  return node;
}

/* ── Filters ── */

function applyFilters() {
  var status = document.getElementById('filter-status').value;
  var search = document.getElementById('search-box').value.toLowerCase();
  document.querySelectorAll('.task-node').forEach(function(el) {
    var path = el.dataset.path || '';
    var task = taskByPath[path];
    if (!task) { el.style.display = ''; return; }
    var visible = anyDescendantMatches(task, status, search);
    el.style.display = visible ? '' : 'none';
  });
}

/* ── DAG view ── */

async function renderDag() {
  var container = document.getElementById('view-dag');
  var task = TASK_DATA;

  if (!task.children.length) {
    container.innerHTML = '<p style="color:var(--text-mute)">No subtasks to visualize.</p>';
    return;
  }

  var statusColors = {
    'not-started': '#e0e0e0', 'in-progress': '#bbdefb',
    'implemented': '#fff9c4', 'revise': '#ffcdd2', 'approved': '#c8e6c9'
  };

  var mermaidCode = 'graph LR\n';
  var allTasks = flattenTasks(task).filter(function(t) { return t.path; });
  for (var i = 0; i < allTasks.length; i++) {
    var child = allTasks[i];
    var s = child.effective_status;
    var color = statusColors[s] || '#e0e0e0';
    var nodeId = child.path.replace(/[^a-zA-Z0-9_]/g, '_');
    mermaidCode += '    ' + nodeId + '["' + sanitizeMermaid(child.title || child.path) + '"]\n';
    mermaidCode += '    style ' + nodeId + ' fill:' + color + '\n';
  }
  for (var j = 0; j < allTasks.length; j++) {
    var ch = allTasks[j];
    var childId = ch.path.replace(/[^a-zA-Z0-9_]/g, '_');
    for (var k = 0; k < ch.depends_on.length; k++) {
      var depId = ch.depends_on[k].replace(/[^a-zA-Z0-9_]/g, '_');
      mermaidCode += '    ' + depId + ' --> ' + childId + '\n';
    }
  }

  container.innerHTML = '<div class="dag-controls">' +
    '<strong>Dependency Graph:</strong> ' + esc(task.title || 'root') + '</div>' +
    '<div class="mermaid">' + mermaidCode + '</div>';

  try {
    await mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
  } catch(e) {
    container.innerHTML += '<p style="color:var(--st-rev-t);margin-top:8px">DAG render error: ' + esc(e.message) + '</p>';
  }
}

/* ── Kanban view ── */

function renderKanban() {
  var container = document.getElementById('view-kanban');
  container.innerHTML = '';
  var statuses = ['not-started', 'in-progress', 'implemented', 'revise', 'approved'];
  var labels = {
    'not-started': 'Not Started', 'in-progress': 'In Progress',
    'implemented': 'Implemented', 'revise': 'Revise', 'approved': 'Approved'
  };
  var all = flattenTasks(TASK_DATA).filter(function(t) { return t.is_leaf && t.path; });

  for (var i = 0; i < statuses.length; i++) {
    var st = statuses[i];
    var col = document.createElement('div');
    col.className = 'kanban-col';
    var tasks = all.filter(function(t) { return t.effective_status === st; });
    col.innerHTML = '<div class="kanban-col-header">' + labels[st] +
      ' <span class="count">' + tasks.length + '</span></div>';
    for (var j = 0; j < tasks.length; j++) {
      (function(t) {
        var card = document.createElement('div');
        card.className = 'kanban-card';
        card.innerHTML = '<div class="kanban-card-title">' + esc(t.title || t.path) + '</div>' +
          '<div class="kanban-card-path">' + esc(t.path) + '</div>';
        card.onclick = function() { showView('tree'); expandToPath(t.path); };
        col.appendChild(card);
      })(tasks[j]);
    }
    container.appendChild(col);
  }
}

function expandToPath(path) {
  var parts = path.split('/');
  var accumulated = '';
  for (var i = 0; i < parts.length; i++) {
    accumulated = i === 0 ? parts[i] : accumulated + '/' + parts[i];
    expandedTasks.add(accumulated);
  }
  renderTree();
  requestAnimationFrame(function() {
    var el = document.querySelector('.task-node[data-path="' + path + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
