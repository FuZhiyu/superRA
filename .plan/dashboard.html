<style>
/* ── Light / Dark tokens ── */
:root {
  --font-display: 'Source Serif 4', 'Georgia', serif;
  --font-mono: 'IBM Plex Mono', 'Menlo', monospace;

  --bg:        #faf9f7;
  --bg-alt:    #f2f0ec;
  --bg-card:   #ffffff;
  --bg-hover:  #edeae4;
  --text:      #2c2a25;
  --text-mid:  #6b6560;
  --text-mute: #9e9890;
  --border:    #ddd8d0;
  --border-lt: #eae6df;
  --accent:    #b44d2d;
  --accent-hover: #953f24;
  --accent-soft: rgba(180,77,45,0.08);

  --tree-line: #d4cfc7;

  --st-ns:     #e8e5df;  --st-ns-t:   #8a857d;
  --st-ip:     #d6e6f5;  --st-ip-t:   #2a6496;
  --st-impl:   #f5edd4;  --st-impl-t: #8a6d1b;
  --st-rev:    #f5d9d4;  --st-rev-t:  #9b3228;
  --st-ok:     #d4e8d4;  --st-ok-t:   #2d6a30;

  --progress-bg:    #e8e5df;
  --progress-fill:  #6b9e6d;

  --kanban-bg: var(--bg-alt);
  --kanban-card-bg: var(--bg-card);
  --kanban-card-border: var(--border);

  --shadow-sm: 0 1px 2px rgba(44,42,37,0.06);
  --shadow-md: 0 2px 8px rgba(44,42,37,0.08);
}

[data-theme="dark"] {
  --bg:        #1c1b19;
  --bg-alt:    #252320;
  --bg-card:   #2c2a27;
  --bg-hover:  #353330;
  --text:      #e0ddd7;
  --text-mid:  #a09b93;
  --text-mute: #706b63;
  --border:    #3d3a35;
  --border-lt: #33302c;
  --accent:    #e07850;
  --accent-hover: #f09070;
  --accent-soft: rgba(224,120,80,0.10);

  --tree-line: #3d3a35;

  --st-ns:     #33312e;  --st-ns-t:   #9e9890;
  --st-ip:     #1f3248;  --st-ip-t:   #7ab0e0;
  --st-impl:   #3a3018;  --st-impl-t: #d4b64a;
  --st-rev:    #3e201c;  --st-rev-t:  #e08070;
  --st-ok:     #1e3320;  --st-ok-t:   #7ec080;

  --progress-bg:    #33312e;
  --progress-fill:  #5a9a5c;

  --kanban-bg: var(--bg-alt);
  --kanban-card-bg: var(--bg-card);
  --kanban-card-border: var(--border);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.3);
}

/* ── Reset + base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header bar ── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 16px;
  padding: 10px 24px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.header-title {
  font-family: var(--font-display);
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
  white-space: nowrap;
}
.header-stats {
  display: flex; align-items: center; gap: 14px;
  margin-left: 8px;
  font-size: 12px; color: var(--text-mute);
}
.header-stats strong { color: var(--text-mid); font-weight: 600; }

/* Progress bar */
.progress-track {
  width: 120px; height: 6px;
  background: var(--progress-bg);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--progress-fill);
  border-radius: 3px;
  transition: width 0.4s ease;
}

.header-spacer { flex: 1; }

/* Controls */
.header-controls {
  display: flex; align-items: center; gap: 6px;
}
.hc-btn, .hc-select {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.15s ease;
}
.hc-btn:hover, .hc-select:hover { background: var(--bg-hover); color: var(--text); }
.hc-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.hc-search {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--bg);
  color: var(--text);
  width: 180px;
  transition: border-color 0.15s ease;
}
.hc-search:focus {
  outline: none;
  border-color: var(--accent);
}
.hc-search::placeholder { color: var(--text-mute); }
.theme-toggle {
  font-size: 16px; line-height: 1;
  background: none; border: none;
  color: var(--text-mute); cursor: pointer;
  padding: 4px;
  transition: color 0.15s ease;
}
.theme-toggle:hover { color: var(--text); }

/* ── Main content area ── */
.main-content {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 24px 60px;
}

/* ── Tree View ── */
.task-tree { }
.task-node {
  position: relative;
}
.task-node + .task-node { margin-top: 1px; }

/* Tree connector lines */
.task-children {
  position: relative;
  margin-left: 20px;
  padding-left: 16px;
  border-left: 1px solid var(--tree-line);
}

/* ── Task row (always visible) ── */
.task-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.task-row:hover { background: var(--bg-hover); }

.task-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px; height: 16px;
  font-size: 10px;
  color: var(--text-mute);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.task-toggle.expanded { transform: rotate(90deg); }
.task-toggle.leaf { visibility: hidden; }

.task-slug {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
}
.task-title-text {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 400;
  color: var(--text-mid);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* Status badge */
.badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.03em;
  padding: 1px 7px;
  border-radius: 3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-not-started  { background: var(--st-ns);   color: var(--st-ns-t);   }
.badge-in-progress  { background: var(--st-ip);   color: var(--st-ip-t);   }
.badge-implemented  { background: var(--st-impl); color: var(--st-impl-t); }
.badge-revise       { background: var(--st-rev);  color: var(--st-rev-t);  }
.badge-approved     { background: var(--st-ok);   color: var(--st-ok-t);   }

.task-progress {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  flex-shrink: 0;
}

/* ── Task body (expanded) ── */
.task-body {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.2s ease;
  padding: 0 8px 0 30px;
}
.task-body.open {
  max-height: 5000px;
  opacity: 1;
  padding: 4px 8px 8px 30px;
}

/* Section toggles inside task body */
.section-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  margin: 2px 0;
  border-radius: 3px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s ease;
}
.section-toggle:hover { background: var(--bg-hover); }
.section-icon {
  font-size: 9px;
  color: var(--text-mute);
  transition: transform 0.2s ease;
  width: 12px;
  text-align: center;
}
.section-icon.expanded { transform: rotate(90deg); }
.section-label {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-mid);
}
.section-preview {
  font-size: 11px;
  color: var(--text-mute);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 400px;
}

.section-content {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.3s ease, opacity 0.2s ease;
  padding-left: 20px;
}
.section-content.open {
  max-height: 8000px;
  opacity: 1;
  padding-bottom: 4px;
}

/* Rendered markdown inside sections */
.rendered-md {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  padding: 6px 0;
}
.rendered-md h1, .rendered-md h2, .rendered-md h3 {
  font-family: var(--font-display);
  font-weight: 600;
  margin: 12px 0 6px;
}
.rendered-md h1 { font-size: 16px; }
.rendered-md h2 { font-size: 14px; }
.rendered-md h3 { font-size: 13px; }
.rendered-md p { margin: 4px 0; }
.rendered-md ul, .rendered-md ol { padding-left: 18px; margin: 4px 0; }
.rendered-md li { margin: 2px 0; }
.rendered-md pre {
  background: var(--bg-alt);
  padding: 10px 12px;
  border-radius: 4px;
  overflow-x: auto;
  margin: 6px 0;
  border: 1px solid var(--border-lt);
}
.rendered-md code {
  font-family: var(--font-mono);
  font-size: 12px;
}
.rendered-md p code, .rendered-md li code {
  background: var(--bg-alt);
  padding: 1px 4px;
  border-radius: 2px;
}
.rendered-md blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 12px;
  margin: 6px 0;
  background: var(--accent-soft);
  border-radius: 0 3px 3px 0;
}
.rendered-md table {
  border-collapse: collapse;
  margin: 6px 0;
  font-size: 12px;
}
.rendered-md th, .rendered-md td {
  border: 1px solid var(--border);
  padding: 4px 8px;
  text-align: left;
}
.rendered-md th { background: var(--bg-alt); font-weight: 600; }

/* Metadata pills inside task body */
.task-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid var(--border-lt);
}
.meta-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  background: var(--bg-alt);
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.meta-pill strong { color: var(--text-mid); font-weight: 600; }

/* ── DAG view ── */
.dag-container {
  padding: 16px 0;
}
.dag-controls {
  font-family: var(--font-display);
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--text-mid);
}
.dag-controls strong { color: var(--text); }

/* ── Kanban view ── */
.kanban {
  display: flex;
  gap: 14px;
  padding: 16px 0;
  overflow-x: auto;
  min-height: 400px;
}
.kanban-col {
  min-width: 200px;
  flex: 1;
  background: var(--kanban-bg);
  border-radius: 6px;
  padding: 10px;
}
.kanban-col-header {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 600;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 2px solid var(--border);
  color: var(--text-mid);
}
.kanban-col-header .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mute);
  font-weight: 400;
}
.kanban-card {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: var(--kanban-card-bg);
  border: 1px solid var(--kanban-card-border);
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.kanban-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.kanban-card-title {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  color: var(--text);
}
.kanban-card-path {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-mute);
  margin-top: 3px;
}

/* ── Utility ── */
.hidden { display: none !important; }

/* ── Animations ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.task-node { animation: fadeIn 0.15s ease both; }
.task-tree > .task-node:nth-child(1)  { animation-delay: 0.02s; }
.task-tree > .task-node:nth-child(2)  { animation-delay: 0.04s; }
.task-tree > .task-node:nth-child(3)  { animation-delay: 0.06s; }
.task-tree > .task-node:nth-child(4)  { animation-delay: 0.08s; }
.task-tree > .task-node:nth-child(5)  { animation-delay: 0.10s; }
.task-tree > .task-node:nth-child(6)  { animation-delay: 0.12s; }
.task-tree > .task-node:nth-child(7)  { animation-delay: 0.14s; }
.task-tree > .task-node:nth-child(8)  { animation-delay: 0.16s; }
.task-tree > .task-node:nth-child(9)  { animation-delay: 0.18s; }
.task-tree > .task-node:nth-child(10) { animation-delay: 0.20s; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="header-title" id="plan-title">Plan Dashboard</span>
  <div class="header-stats">
    <span id="stat-tasks"></span>
    <span id="stat-approved"></span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <span id="stat-updated"></span>
  </div>
  <div class="header-spacer"></div>
  <div class="header-controls">
    <input type="text" class="hc-search" id="search-box" placeholder="Search tasks..." oninput="applyFilters()">
    <select class="hc-select" id="filter-status" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="not-started">not-started</option>
      <option value="in-progress">in-progress</option>
      <option value="implemented">implemented</option>
      <option value="revise">revise</option>
      <option value="approved">approved</option>
    </select>
    <button class="hc-btn active" id="btn-tree" onclick="showView('tree')">Tree</button>
    <button class="hc-btn" id="btn-dag" onclick="showView('dag')">DAG</button>
    <button class="hc-btn" id="btn-kanban" onclick="showView('kanban')">Kanban</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">&#9681;</button>
  </div>
</div>

<!-- ── Content ── -->
<div class="main-content">
  <div id="view-tree" class="task-tree"></div>
  <div id="view-dag" class="dag-container hidden"></div>
  <div id="view-kanban" class="kanban hidden"></div>
</div>

name with sibling cascade (with auto-rebuild)\n- `skills/task-system/scripts/plan_migrate.py` \u2014 PLAN.md migration + `--upgrade` for v1\u2192v2\n- `skills/task-system/scripts/plan_dashboard.py` \u2014 single-page recursive expand/collapse HTML dashboard\n- `skills/task-system/scripts/test_task_system.py` \u2014 53 tests\n\n**Pipeline:** `~/.venv/bin/python -m pytest skills/task-system/scripts/test_task_system.py -v`\n",

          "body": "\n## Objective\n\nMake the task system the primary handoff mechanism, replacing the monolithic PLAN.md + RESULTS.md pair. Every agent role (planner, implementer, reviewer, orchestrator) needs to know how to interact with `.plan/` \u2014 reading tasks with context, editing body sections, and recording decisions.\n\n## Design Decisions\n\n**Indexing: Path (not UUID).** The relative path within `.plan/` is the canonical task identifier (e.g., `data-preparation/merge`). Directory names are descriptive slugs \u2014 no numeric prefixes. Display and execution order derived from DAG topological sort of `depends_on`.\n\n**Hooks + Convenience CLI.** Agents edit task.md directly using Read/Edit/Write. PostToolUse hooks handle validation (frontmatter, dep references, cycle detection) and dashboard rebuild. `task_create.py` kept for convenience (auto-fills template). Read-path CLI kept: `task_read.py` (context injection), `task_query.py` (tree/frontier/DAG).\n\n**Flexible body sections.** No rigid structure enforced. Any `## Heading` is valid \u2014 each becomes a foldable layer in dashboard. Recommended defaults: `## Objective`, `## Results`, `## Decisions`, `## Review Notes`.\n\n**User decisions in-task.** Decisions go in the relevant task's `## Decisions` section. Cross-cutting decisions in root task's `## Decisions`. No separate monolithic section.\n\n\n**Progressive skill revelation (3 tiers).** Consumer (SKILL.md body: read, edit, query), Planner (references/planning.md: objectives, splitting, retroactive), Contributor (references/internals.md: data layer, hooks).\n\n**What replaces what:**\n\n| Old | New |\n|---|---|\n| PLAN.md header | Root task.md body sections |\n| `## Project Conventions` | Root task.md `## Conventions` |\n| `## Workflow Status` | Root task.md `## Workflow Status` |\n| `### Task N:` block | `\u003cpath\u003e/task.md` |\n| RESULTS.md task section | Task's `## Results` |\n| `**Review status:**` | `review_status:` in frontmatter |\n| Review-notes blockquote | Task's `## Review Notes` |\n| Steps with checkboxes | Subtasks or prose |\n| Separate RESULTS.md | Gone \u2014 results in task.md body |\n\n## Results\n\n",

cal tie-breaking; falls back to alphabetical order if cycles prevent full sort.\n2. **`_walk_children()`** \u2014 Replaced `sorted(subdirs)` alphabetical ordering with a call to `_topological_sort()` on the parsed child tasks so `depends_on` drives sibling ordering.\n3. **`validate_frontmatter(task)`** \u2014 Checks `status`, `review_status`, `integration_status` against their enum sets, and checks `depends_on`/`tags` are list-of-strings, and `title` is non-empty.\n4. **`validate_dependencies(task, siblings)`** \u2014 Checks each `depends_on` entry is a known sibling name.\n5. **`detect_cycles(tasks)`** \u2014 DFS-based cycle detection among a sibling group.\n6. **`validate_plan(plan_root)`** \u2014 Walks the entire plan tree, runs all three validations at each level, returns prefixed warning strings.\n\nAll 53 existing tests pass.\n\n## Review Notes\n\nMINOR observations (non-blocking):\n\n1. [_task_io.py:331](skills/task-system/scripts/_task_io.py#L331) \u2014 Docstring says \"DFS-based Kahn's algorithm\" but the implementation is Kahn's algorithm (BFS/in-degree based with a priority queue), not DFS-based. The terminology is contradictory.\n\n2. [_task_io.py:352](skills/task-system/scripts/_task_io.py#L352) \u2014 `import heapq` is inside the function body rather than at the module top with the other stdlib imports. Functional but inconsistent with the file's style.\n\n3. The objective specified `detect_cycles` should use \"transitive closure\" but the implementation uses DFS. Both correctly detect cycles; the DFS approach is arguably simpler and equally correct.\n\n4. No new tests added for `_topological_sort`, `validate_frontmatter`, `validate_dependencies`, `detect_cycles`, or `validate_plan`. The functions work correctly (verified manually) but have zero automated test coverage. The objective did not explicitly require tests.\n",

                  "body": "\n## Objective\n\nCreate PostToolUse hooks that fire when an agent edits or writes a `task.md` file within `.plan/`. Two components:\n\n### 1. Hook script (`skills/task-system/scripts/task_hook.py`)\n\n- Receives the tool name and file path from the hook environment variables\n- Checks if the file is a `task.md` under a `.plan/` directory\n- If not a task.md edit: exit 0 immediately (fast path)\n- If yes: find plan root by walking up from the file path\n- Run `validate_plan(plan_root)` from `_task_io.py`, print any warnings to stderr\n- Run `generate_dashboard(plan_root)` best-effort (try/except, never fail)\n- Exit 0 always \u2014 never block the agent\n\nThe hook uses `_find_plan_root()` from `_task_io.py` to locate the plan root. It imports `validate_plan` and `generate_dashboard` from the same module.\n\n### 2. Hook configuration\n\nAdd to project `.claude/settings.json`:\n```json\n{\n  \"hooks\": {\n    \"PostToolUse\": [\n      {\n        \"matcher\": \"Edit|Write\",\n        \"command\": \"python3 skills/task-system/scripts/task_hook.py\"\n      }\n    ]\n  }\n}\n```\n\nThe hook reads `$CLAUDE_TOOL_NAME` and `$CLAUDE_FILE_PATH` (or equivalent) from the environment. Check the Claude Code hook documentation for the exact env var names available to PostToolUse hooks.\n\nThe hook provides immediate feedback: validation warnings appear as hook output visible to the agent, dashboard is silently rebuilt. The agent sees warnings and can fix issues on the next edit.\n\n## Results\n\n### 1. Hook script ([`skills/task-system/scripts/task_hook.py`](skills/task-system/scripts/task_hook.py))\n\nReads PostToolUse JSON from stdin. Fast path exits immediately for non-Edit/Write tools, non-`task.md` filenames, and paths not under `.plan/`. On a matching edit:\n\n- Calls `_find_plan_root()` from `_task_io.py` to locate the plan root.\n- Calls `validate_plan(plan_root)` and prints any warnings to stderr (prefixed `[task-hook] WARNING:`).\n- Calls `generate_dashboard(plan_root)` best-effort (try/except, non-fatal).\n- Always exits 0.\n\nImport approach: adds the `scripts/` directory to `sys.path` at runtime rather than using `importlib.util.spec_from_file_location`, which fails with `@dataclass` under Python 3.14 when the module is loaded outside `sys.modules`.\n\n### 2. Hook configuration ([`hooks/hooks.json`](hooks/hooks.json))\n\nAdded a `PostToolUse` entry matching `Edit|Write` to the plugin's tracked `hooks/hooks.json`. Hook command: `python3 \"${CLAUDE_PLUGIN_ROOT}/skills/task-system/scripts/task_hook.py\"`, using the same `${CLAUDE_PLUGIN_ROOT}` convention as all other plugin hooks.\n\nNote: `.claude/` is gitignored in this project. The task spec's \"add to `.claude/settings.json`\" would be a local-only runtime config. The tracked deliverable is `hooks/hooks.json`, which is installed by the plugin system and picked up by Claude Code.\n\n### Verification\n\n- Fast-path cases (Bash tool, non-task.md edit, task.md outside `.plan/`): all exit 0 with no output.\n- Valid plan edit (`.plan/task.md`): runs validation silently, rebuilds dashboard, exits 0.\n- Invalid-status task.md: prints validation warning to stderr, dashboard rebuild catches the parse error non-fatally, exits 0.\n- All 53 existing `test_task_system.py` tests pass.\n",
                  "objective": "\nCreate PostToolUse hooks that fire when an agent edits or writes a `task.md` file within `.plan/`. Two components:\n\n### 1. Hook script (`skills/task-system/scripts/task_hook.py`)\n\n- Receives the tool name and file path from the hook environment variables\n- Checks if the file is a `task.md` under a `.plan/` directory\n- If not a task.md edit: exit 0 immediately (fast path)\n- If yes: find plan root by walking up from the file path\n- Run `validate_plan(plan_root)` from `_task_io.py`, print any warnings to stderr\n- Run `generate_dashboard(plan_root)` best-effort (try/except, never fail)\n- Exit 0 always \u2014 never block the agent\n\nThe hook uses `_find_plan_root()` from `_task_io.py` to locate the plan root. It imports `validate_plan` and `generate_dashboard` from the same module.\n\n### 2. Hook configuration\n\nAdd to project `.claude/settings.json`:\n```json\n{\n  \"hooks\": {\n    \"PostToolUse\": [\n      {\n        \"matcher\": \"Edit|Write\",\n        \"command\": \"python3 skills/task-system/scripts/task_hook.py\"\n      }\n    ]\n  }\n}\n```\n\nThe hook reads `$CLAUDE_TOOL_NAME` and `$CLAUDE_FILE_PATH` (or equivalent) from the environment. Check the Claude Code hook documentation for the exact env var names available to PostToolUse hooks.\n\nThe hook provides immediate feedback: validation warnings appear as hook output visible to the agent, dashboard is silently rebuilt. The agent sees warnings and can fix issues on the next edit.\n",
                  "results": "\n### 1. Hook script ([`skills/task-system/scripts/task_hook.py`](skills/task-system/scripts/task_hook.py))\n\nReads PostToolUse JSON from stdin. Fast path exits immediately for non-Edit/Write tools, non-`task.md` filenames, and paths not under `.plan/`. On a matching edit:\n\n- Calls `_find_plan_root()` from `_task_io.py` to locate the plan root.\n- Calls `validate_plan(plan_root)` and prints any warnings to stderr (prefixed `[task-hook] WARNING:`).\n- Calls `generate_dashboard(plan_root)` best-effort (try/except, non-fatal).\n- Always exits 0.\n\nImport approach: adds the `scripts/` directory to `sys.path` at runtime rather than using `importlib.util.spec_from_file_location`, which fails with `@dataclass` under Python 3.14 when the module is loaded outside `sys.modules`.\n\n### 2. Hook configuration ([`hooks/hooks.json`](hooks/hooks.json))\n\nAdded a `PostToolUse` entry matching `Edit|Write` to the plugin's tracked `hooks/hooks.json`. Hook command: `python3 \"${CLAUDE_PLUGIN_ROOT}/skills/task-system/scripts/task_hook.py\"`, using the same `${CLAUDE_PLUGIN_ROOT}` convention as all other plugin hooks.\n\nNote: `.claude/` is gitignored in this project. The task spec's \"add to `.claude/settings.json`\" would be a local-only runtime config. The tracked deliverable is `hooks/hooks.json`, which is installed by the plugin system and picked up by Claude Code.\n\n### Verification\n\n- Fast-path cases (Bash tool, non-task.md edit, task.md outside `.plan/`): all exit 0 with no output.\n- Valid plan edit (`.plan/task.md`): runs validation silently, rebuilds dashboard, exits 0.\n- Invalid-status task.md: prints validation warning to stderr, dashboard rebuild catches the parse error non-fatally, exits 0.\n- All 53 existing `test_task_system.py` tests pass.\n",

              "status": "approved",

              "body": "\n## Objective\n\nRestructure `skills/task-system/SKILL.md` into three tiers. Current SKILL.md mixes consumer, planner, and contributor concerns.\n\n### Tier 1 \u2014 SKILL.md body (consumer-facing)\n\nWhat implementers and reviewers need to work with `.plan/`:\n\n- **Core concepts:** everything is a task, filesystem = hierarchy, sibling-only deps, status rollup, DAG-derived ordering (no numeric prefixes)\n- **How to read a task:** `task_read.py --path \u003cpath\u003e` with ancestor context injection\n- **How to edit:** directly edit task.md with Read/Edit tools. PostToolUse hooks validate frontmatter and rebuild dashboard automatically\n- **Flexible sections:** any `## Heading` is valid and becomes foldable in the dashboard. Recommended defaults: `## Objective` (what success looks like), `## Results` (findings), `## Decisions` (user decisions), `## Review Notes` (reviewer feedback)\n- **Frontmatter:** edit directly \u2014 `status`, `review_status`, `depends_on`, `tags`, `script`, `input`, `output`. Hooks validate enum values\n- **Ownership model:** you own the body sections of your assigned task. You don't own: other tasks' content, scope-defining frontmatter (title, depends_on, script, input, output \u2014 those are planner-owned)\n- **Task file format:** compact reference showing frontmatter fields + body section example\n- **Query tools:** `task_query.py --tree`, `--frontier`, `--dag`\n- **Creating tasks:** `task_create.py` auto-fills template with dates and frontmatter defaults\n\n### Tier 2 \u2014 `references/planning.md` (planner-facing)\n\nWhat orchestrators and planners need:\n\n- **Objective writing guide:**\n  - An objective describes what success looks like, not how to get there\n  - Include: goal, relevant conventions (naming, paths, units, variable definitions), constraints (what NOT to do), input/output expectations, validation criteria\n  - Include enough context that an implementer with zero project context can work independently after reading the ancestor chain\n  - Necessary steps that need tracking \u2192 create as subtasks\n  - Suggestive approaches \u2192 state as suggestions in prose, e.g. \"Consider using a left join on fund_id x date\"\n  - Do NOT prescribe implementation steps \u2014 that's the implementer's job\n  - DO prescribe validation criteria \u2014 what must be true for the task to be complete\n\n- **Task splitting guide:**\n  - A task should be worth reviewing independently \u2014 if the review would be trivial (\"yes you renamed a variable\"), it's too small\n  - A task should be worth dispatching \u2014 spawn cost (skill-load, context hydration) should be justified by the work\n  - A task should be goal-oriented \u2014 \"merge holdings with characteristics\" not \"run merge script\"\n  - Split when: different concerns, different data sources, independent work streams, different domain skills\n  - Don't split when: trivially sequential, too small to review, artificially decomposing one logical operation\n  - When in doubt: can you describe the task's success criteria in one sentence? If yes, it's the right size\n\n- **Root task.md anatomy:** objective, conventions, workflow status, decisions\n- **Retroactive plan creation workflow:** how to create `.plan/` from existing work\n- **Hierarchy management:** `task_create.py` (auto-fills template), `task_rename.py`, `task_link.py`\n\n### Tier 3 \u2014 `references/internals.md` (contributor-facing)\n\nMove from current SKILL.md:\n- `_task_io.py` data layer details (Task dataclass, parse/serialize, walk, frontier, rollup, validation functions)\n- Hook architecture and configuration (`task_hook.py`, settings.json)\n- Migration (`plan_migrate.py`) details\n- Dashboard generation details\n\n### Also update\n\n- `skills/CATEGORIES.md` \u2014 update task-system description to reflect new role as primary handoff mechanism\n- `README.md` skill inventory \u2014 same\n\n## Results\n\nRestructured into three tiers:\n- **SKILL.md** (Tie               "body": "\n## Objective\n\nDeprecate `skills/handoff-doc/` \u2014 its content is now redundant with the task-system skill and the agent role specs.\n\n### What was handoff-doc\n\nhandoff-doc owned: four document principles, inline-edit rule, stale-content checklist, User Decisions Log format, plan-anatomy templates, results-anatomy templates.\n\n### Why it's redundant\n\nWith .plan/ as the primary handoff mechanism:\n- **Editing discipline** (inline-edit only, latest state, no strikethroughs) \u2192 now embedded in `agents/implementer.md` \u00a7Editing Etiquette\n- **Task anatomy** \u2192 now in `skills/task-system/references/planning.md`\n- **Results shape** \u2192 now in `skills/task-system/references/planning.md` or task-system consumer tier\n- **Ownership rules** \u2192 now in `skills/task-system/SKILL.md` (consumer tier) and agent role specs\n- **User Decisions Log** \u2192 trivial: \"put decisions in `## Decisions` section\"\n- **Stale-content checklist** \u2192 embeddable in role specs or task-system\n\n### What to do\n\n1. **Merge any remaining unique content** from `skills/handoff-doc/references/` into `skills/task-system/references/`:\n   - Plan-anatomy content (root task.md anatomy, task.md anatomy, field-by-field notes) \u2192 merge into `task-system/references/planning.md`\n   - Results-anatomy content (per-task results shape, figure embedding, Stage 2 maturation) \u2192 add as a section in `task-system/references/planning.md` or a new `task-system/references/results-guide.md`\n   - Stale-content checklist \u2192 embed in `task-system/SKILL.md` consumer tier\n   - User Decisions Log format (3-line blockquote) \u2192 embed in `task-system/references/planning.md`\n\n2. **Replace SKILL.md body** with a deprecation redirect:\n   ```\n   This skill is deprecated. Its concerns are now owned by:\n   - Editing discipline: agents/implementer.md \u00a7Editing Etiquette\n   - Task anatomy and creation: skills/task-system/ (references/planning.md)\n   - Results format: skills/task-system/ (references/planning.md \u00a7Results)\n   - User Decisions Log: skills/task-system/ (references/planning.md \u00a7Decisions)\n   ```\n\n3. **Update Skill-Load Manifest** in `skills/using-superRA/SKILL.md`:\n   - Remove handoff-doc from the `Stage: documentation` row\n   - Remove the \"main agents additionally load handoff-doc\" instruction\n   - Remove from skill inventory table\n\n4. **Update CATEGORIES.md and README.md** \u2014 remove or mark deprecated\n\n5. **Update CLAUDE.md ownership table** \u2014 reassign handoff-doc concerns to task-system\n\n6. **Remove handoff-doc loads** from any workflow skill that references `superRA:handoff-doc`\n\n## Decisions\n\n\u003e **User decision (2026-05-24):** Deprecate handoff-doc entirely \u2014 its content is redundant with task-system + agent role specs in the .plan/ world.\n\u003e **Question asked:** Why do we still have handoff-doc if we're replacing PLAN.md/RESULTS.md with .plan/?\n\u003e **Rationale:** Task-system skill now owns format/interaction, agent role specs own discipline, planning-workflow owns creation. No unique concern left for handoff-doc.\n\n## Results\n\n### Key Findings\n- Merged all unique content from `handoff-doc/references/` into `task-system/references/planning.md`: field-by-field notes, User Decisions Log, Conventions section discipline, Workflow Status checkboxes, Stale Content Checklist, Results Shape (two-stage lifecycle, per-task template, section ownership, figure embedding).\n- Replaced `handoff-doc/SKILL.md` body with 12-line deprecation redirect.\n- Replaced both reference files with one-line redirects.\n- Removed handoff-doc from `using-superRA/SKILL.md`: inventory table, Stage: documentation row (replaced with `report-in-markdown`), \"main agents additionally load\" instruction, Skill-Load Manifest explanatory paragraph.\n- Updated 14 files across workflow skills, agent files, utility skills, and domain references to point at `task-system/referenc               "body": "\n## Objective\n\nCreate `skills/task-system/scripts/task_read.py` \u2014 the primary way agents understand a task before working on it. Reads a task and injects ancestor context as a chain.\n\n### Output format (human-readable, default)\n\n```\n=== Ancestor Context ===\n\n# [Root title]\n[Root body \u2014 first section or first paragraph]\n\n## [Parent title]  (status: approved)\n[Parent body \u2014 first section or first paragraph]\n\n=== Task: [Current title] ===\n[Full task.md content \u2014 frontmatter rendered as readable key: value lines + all body sections]\n\n=== Sibling Dependencies ===\n- load-raw-data (approved) \u2014 \"Load CRSP mutual fund holdings\"\n- clean-data (in-progress) \u2014 \"Apply standard filters\"\n```\n\n### CLI interface\n\n```bash\npython3 task_read.py --plan-root .plan --path data-preparation/merge [--no-ancestors] [--json]\n```\n\n### Behavior\n\n- Walk from the plan root to the target task, collecting the first body section (or first paragraph if long) from each ancestor's task.md\n- Display ancestor chain as progressive context with hierarchical headers\n- Show the full current task.md content: frontmatter rendered as readable key-value pairs (not raw YAML), plus all `##` body sections\n- Show sibling dependency status: for each entry in `depends_on`, show the sibling's title and effective status\n- `--no-ancestors` flag: skip the ancestor chain, show only the current task\n- `--json` flag: structured JSON output with `ancestors` array, `task` object (frontmatter + body sections dict), and `dependencies` array\n- Auto-detect plan root if `--plan-root` not given: walk up from cwd looking for a directory containing `task.md` whose parent does not contain `task.md`\n- Uses `walk_plan()`, `parse_frontmatter()`, and `parse_body_sections()` from `_task_io.py`\n\n## Results\n\nCreated `skills/task-system/scripts/task_read.py` (stdlib-only, argparse CLI). Supports `--plan-root`, `--path`, `--no-ancestors`, and `--json` flags. Auto-detects plan root from cwd when `--plan-root` is omitted. Ancestor chain uses hierarchical `#`/`##`/`###` headers with first-section excerpts (10-line cap). Full task frontmatter rendered as human-readable key-value pairs. Sibling dependencies listed with effective status. JSON mode emits `ancestors`, `task`, and `dependencies` keys. All 53 existing tests pass.\n\n## Review Notes\n\nNo blocking findings. All functionality verified: ancestor chain collection, human-readable and JSON rendering, `--no-ancestors` flag, plan-root auto-detection, sibling dependency display. Edge cases tested (single-segment paths, root ancestors, no-plan directories).\n\nMINOR observation: No automated tests for `task_read.py`. The objective did not require them and all functions verified manually.\n",

              "body": "\n## Objective\n\nAdd tests for new functionality to `skills/task-system/scripts/test_task_system.py`. Verify existing tests still pass.\n\n### Validation functions (`_task_io.py`)\n\n- `validate_frontmatter`: catches bad enum values (e.g., `status: done` \u2192 warning), wrong types (e.g., `depends_on: \"foo\"` instead of list)\n- `validate_dependencies`: catches missing sibling references (e.g., `depends_on: [nonexistent]` \u2192 warning)\n- `detect_cycles`: catches circular deps (A\u2192B\u2192C\u2192A \u2192 warning with cycle description)\n- `validate_plan`: aggregates all warnings with task path prefixes\n\n### Topological sort\n\n- Children sorted by dependency order, not alphabetical (e.g., if B depends on A, order is A, B even if B \u003c A alphabetically)\n- Independent tasks in alphabetical order (tiebreaker)\n- Handles diamond dependencies correctly (A\u2192C, B\u2192C, both A and B independent \u2192 A, B alphabetical, then C)\n- Gracefully handles missing deps (warning, falls back to alphabetical)\n\n### `task_read.py`\n\n- Reads leaf task with ancestor context chain (root \u2192 parent \u2192 current)\n- Reads root task (no ancestors section)\n- `--no-ancestors` flag skips ancestor chain\n- `--json` produces valid JSON with `ancestors`, `task`, `dependencies` keys\n- Auto-detect plan root from subdirectory (walk up from cwd)\n- Shows sibling dependency status with title and effective status\n\n### `task_hook.py`\n\n- Ignores non-task.md files (exits 0 immediately)\n- Runs validation on task.md edits, outputs warnings\n- Exits 0 always (even on validation failures or import errors)\n\n**Pipeline:** `~/.venv/bin/python -m pytest skills/task-system/scripts/test_task_system.py -v`\n\n## Results\n\nAdded 39 tests across 6 new test classes to [`test_task_system.py`](skills/task-system/scripts/test_task_system.py). Total suite: 92 tests, all passing.\n\n**New test classes:**\n\n- `TestValidateFrontmatter` (6 tests) \u2014 bad enum values, wrong types for depends_on/tags, empty title\n- `TestValidateDependencies` (4 tests) \u2014 valid deps, missing sibling ref, nonexistent dep, no deps\n- `TestDetectCycles` (4 tests) \u2014 no cycle, simple 2-node cycle, 3-node cycle with `-\u003e` description, independent tasks\n- `TestValidatePlan` (4 tests) \u2014 valid plan, missing dep warning, path prefix on warnings, cycle warning\n- `TestTopologicalSort` (4 tests) \u2014 dep order, alphabetical tiebreaker, diamond, missing dep fallback\n- `TestTaskRead` (10 tests) \u2014 ancestor chain, root task, `--no-ancestors`, JSON keys/ancestors list, sibling dep status, autodetect plan root, nested ancestor chain\n- `TestTaskHook` (7 tests) \u2014 ignores non-task.md, ignores non-Edit/Write, exits 0 on valid/invalid task.md, warnings to stderr, empty stdin, file outside `.plan/`\n",

              "body": "\n## Objective\n\nReplace the static single-file HTML dashboard with a live-updating server-based dashboard. Stack: FastAPI + Jinja2 + htmx + watchfiles, all resolved at runtime via `uv run --with`.\n\n**Design decisions (from brainstorm):**\n- Dynamic loading: only the expanded subtree's data is fetched, not the entire tree\n- Single-page feel: htmx swaps HTML fragments in-place on expand/collapse, no full page reloads\n- Live reload: watchfiles monitors `.plan/` for changes, pushes SSE events, htmx swaps updated fragments\n- Zero install friction: `uv run --with fastapi,uvicorn,jinja2,watchfiles` resolves deps at runtime\n- Preserve existing features: tree view, DAG (Mermaid), kanban, dark/light mode, search/filter, status summary bar\n\n**Tech stack:**\n- `fastapi` + `uvicorn` \u2014 async HTTP server\n- `jinja2` \u2014 server-side HTML templates\n- `watchfiles` \u2014 OS-native filesystem watcher (FSEvents/inotify)\n- `htmx` (CDN) \u2014 dynamic HTML fragment swapping, SSE support\n- `mermaid` (CDN) \u2014 DAG rendering\n- `markdown-it` (CDN) \u2014 markdown rendering in task bodies\n\n**Architecture:**\n- Server reads `.plan/` tree on startup, serves HTML fragments per task node\n- Expand a task \u2192 `hx-get=\"/task/\u003cpath\u003e\"` fetches rendered children\n- SSE endpoint `/events` pushes `task-updated` events when watchfiles detects changes\n- Each task node declares `sse-swap=\"task:\u003cpath\u003e\"` to auto-update on change\n",

                  "body": "\n## Objective\n\nProvide a single-command entry point for launching the live dashboard, with zero-install setup via `uv run --with`.\n\n**CLI interface:**\n- `plan-dashboard serve [--root .plan/] [--port 8080] [--no-open]`\n- `--root` \u2014 path to the `.plan/` directory (default: `.plan/` in cwd)\n- `--port` \u2014 server port (default: 8080)\n- `--no-open` \u2014 skip auto-opening the browser\n- On launch: start uvicorn, print URL, open browser via `webbrowser.open()`\n\n**uv integration:**\n- The script should work as `uv run --with fastapi,uvicorn,jinja2,watchfiles plan_dashboard.py serve`\n- Add inline script metadata (PEP 723) at the top of `plan_dashboard.py` so `uv run plan_dashboard.py serve` auto-resolves dependencies without `--with`:\n  ```python\n  # /// script\n  # requires-python = \"\u003e=3.10\"\n  # dependencies = [\"fastapi\", \"uvicorn\", \"jinja2\", \"watchfiles\"]\n  # ///\n  ```\n- This makes the launch command simply: `uv run plan_dashboard.py serve`\n\n**Backward compatibility:**\n- Keep the existing `plan_dashboard.py generate` command for static HTML generation as a fallback\n- The `serve` subcommand is additive \u2014 doesn't break existing usage\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**CLI subcommands:**\n- `serve [--root .plan/] [--port 8080] [--no-open]` \u2014 starts FastAPI via `uvicorn.run()`, auto-opens browser after 1s delay unless `--no-open`\n- `generate --plan-root PATH [--output PATH]` \u2014 backward-compatible static HTML generation, preserves the full `DASHBOARD_HTML` template from the old script\n\n**PEP 723 inline metadata:**\n```python\n# /// script\n# requires-python = \"\u003e=3.10\"\n# dependencies = [\"fastapi\", \"uvicorn[standard]\", \"jinja2\", \"watchfiles\", \"pyyaml\"]\n# ///\n```\n\nLaunch: `uv run skills/task-system/scripts/plan_dashboard.py serve`\n",

                  "body": "\n## Objective\n\nAdd GitHub-style per-block inline commenting to the dashboard. Users comment on specific blocks (paragraphs, list items, code blocks) within a task's rendered body. Comments are stored in sidecar YAML files alongside `task.md`, readable by agents via a CLI tool.\n\n**Design decisions:**\n- Sidecar file (`comments.yaml`) per task, not embedded in `task.md` \u2014 avoids concurrent write conflicts with agents\n- Anchoring: `section` (## heading) + `block_index` (0-indexed block within section) + `text_preview` (fuzzy fallback when blocks shift)\n- Comments are resolve-able (like GitHub review threads)\n- Dashboard renders comments as collapsible inline annotations below the anchored block\n- Agents read/resolve comments via CLI tool, no need to parse YAML manually\n",
                  "objective": "\nAdd GitHub-style per-block inline commenting to the dashboard. Users comment on specific blocks (paragraphs, list items, code blocks) within a task's rendered body. Comments are stored in sidecar YAML files alongside `task.md`, readable by agents via a CLI tool.\n\n**Design decisions:**\n- Sidecar file (`comments.yaml`) per task, not embedded in `task.md` \u2014 avoids concurrent write conflicts with agents\n- Anchoring: `section` (## heading) + `block_index` (0-indexed block within section) + `text_preview` (fuzzy fallback when blocks shift)\n- Comments are resolve-able (like GitHub review threads)\n- Dashboard renders comments as collapsible inline annotations below the anchored block\n- Agents read/resolve comments via CLI tool, no need to parse YAML manually\n",

                      "updated": "2026-05-24",

                      "body": "\n## Objective\n\nProvide CLI commands so agents can read, act on, and resolve comments without parsing YAML directly.\n\n**Commands:**\n- `task-comment list \u003ctask-path\u003e` \u2014 list all unresolved comments for a task, showing anchor context and body\n- `task-comment list \u003ctask-path\u003e --all` \u2014 include resolved comments\n- `task-comment resolve \u003ctask-path\u003e \u003ccomment-id\u003e` \u2014 mark a comment as resolved\n- `task-comment list-tree [root-path]` \u2014 list all unresolved comments across the tree (summary: task path + count)\n\n**Output format:**\n- Human-readable by default (for agent consumption):\n  ```\n  [#2] (unresolved) Objective, block 3: \"The server should work as...\"\n    \u003e Do we really need configurable root? YAGNI.\n  ```\n- `--json` flag for structured output if needed\n\n**Integration with agent workflow:**\n- Agents check for comments before starting work on a task (`task-comment list \u003cpath\u003e`)\n- After addressing a comment, agents resolve it (`task-comment resolve \u003cpath\u003e \u003cid\u003e`)\n- The resolve action is picked up by the file watcher \u2192 SSE \u2192 dashboard updates live\n\n## Results\n\nImplemented in [`task_comment.py`](../../../../../skills/task-system/scripts/task_comment.py):\n\n- PEP 723 metadata for standalone `uv run` execution\n- Three subcommands: `list`, `resolve`, `list-tree`\n- `list` \u2014 loads comments, re-anchors against current `task.md` body, filters by resolved status, outputs human-readable or JSON\n- `resolve` \u2014 toggles resolved status, prints confirmation\n- `list-tree` \u2014 walks plan tree via `walk_plan`, aggregates unresolved comment counts per task\n- `--plan-root` defaults to `.plan/` in cwd, specified before the subcommand\n- Graceful error handling: missing task directories, non-existent comment IDs, missing `comments.yaml` files\n",

                      "body": "\n## Objective\n\nImplement the frontend commenting UI in the dashboard templates. GitHub-style gutter buttons, inline comment threads, and resolve/delete controls.\n\n**Rendering task bodies as commentable blocks:**\n- Modify the markdown rendering pipeline to wrap each block-level element (paragraph, list, code block, blockquote) in a container div with a data attribute: `data-section=\"Objective\" data-block=\"2\"`\n- This requires either a markdown-it plugin or post-processing the rendered HTML to inject wrappers\n\n**Gutter interaction:**\n- On hover over a block, show a `+` button in the left gutter\n- Click opens an inline comment form below the block\n- Form fields: comment body (textarea), submit button\n- On submit: `hx-post=\"/task/{path}/comment\"` with the anchor data and body\n- htmx swaps in the updated comment thread below the block\n\n**Comment thread rendering:**\n- Existing comments render as a collapsible thread below their anchored block\n- Each comment shows: author, timestamp, body, resolve button, delete button\n- Resolved comments are visually dimmed but still visible (toggleable)\n- Orphaned comments (anchor lost) render at the section heading level with a warning indicator\n\n**Live updates via SSE:**\n- When a comment is added/resolved/deleted, the file watcher detects the `comments.yaml` change\n- SSE pushes an update event, htmx swaps in the refreshed comment thread\n\n**Styling:**\n- Comment thread background: subtle tint (like GitHub's yellow)\n- Gutter button: unobtrusive, appears only on hover\n- Follow existing dark/light theme tokens\n\n## Results\n\nImplemented the full comment UI across two template files:\n\n**`task_node.html`** -- Added `data-section` attributes to section wrapper divs (both named and extra sections) so JavaScript can identify which section a commentable block belongs to.\n\n**`base.html`** -- All changes in the `\u003cscript\u003e` block:\n\n1. **`renderMarkdown(text, sectionName)`** -- Extended with optional `sectionName` parameter. When provided, post-processes the rendered HTML to wrap each top-level block element (P, UL, OL, PRE, BLOCKQUOTE, TABLE, H1-H6) in a `.commentable-block` div with `data-section` and `data-block` attributes, plus a `+` gutter button.\n\n2. **`toggleSection()`** -- Modified to read `data-section` from the parent wrapper and pass it to `renderMarkdown()`. After rendering, calls `loadComments()` to fetch and display existing comments inline.\n\n3. **`showCommentForm(btn)`** -- Creates an inline form (textarea + Comment/Cancel buttons) below the block. On submit, POSTs to `/api/task/{path}/comment` with section, block_index, text_preview (first 60 chars), and body. On success, removes form and reloads comments.\n\n4. **`loadComments(taskPath)`** -- Fetches all comments from `/api/task/{path}/comments`, groups them by section+block_index, finds the matching `.commentable-block` elements, and appends rendered threads. Orphaned comments (no matching block in DOM) render at the section level with a `.comment-orphan-warning` indicator.\n\n5. **`renderCommentThread(comments, taskPath)`** -- Builds a `.comment-thread` div with `.comment-item` entries showing author, timestamp, body, Resolve/Unresolve button, and Delete button. Resolved comments get the `.comment-resolved` class.\n\n6. **`resolveComment()` / `deleteComment()`** -- PATCH and DELETE to the API, then reload comments.\n\n7. **SSE listener** -- Listens for `htmx:sseMessage` events. When a `task:{path}` event fires and the task has open sections, re-fetches comments after a 200ms delay (to let the SSE swap complete first).\n\n8. **`htmx:afterSwap` handler** -- Updated to pass section name to `renderMarkdown()` when re-rendering already-open sections after an SSE swap.\n\nAll 143 existing tests pass unchanged. Uses the existing CSS classes (`.commentable-block`, `.comment-gutter-btn`, `.comment-thread`, `.comment-item`, `.comment-meta`, `.comment-body`, `.comment-resolved`, `.comment-form`, `.comment-orphan-warning`) and the existing `/api/` comment routes.\n",
                      "objective": "\nImplement the frontend commenting UI in the dashboard templates. GitHub-style gutter buttons, inline comment threads, and resolve/delete controls.\n\n**Rendering task bodies as commentable blocks:**\n- Modify the markdown rendering pipeline to wrap each block-level element (paragraph, list, code block, blockquote) in a container div with a data attribute: `data-section=\"Objective\" data-block=\"2\"`\n- This requires either a markdown-it plugin or post-processing the rendered HTML to inject wrappers\n\n**Gutter interaction:**\n- On hover over a block, show a `+` button in the left gutter\n- Click opens an inline comment form below the block\n- Form fields: comment body (textarea), submit button\n- On submit: `hx-post=\"/task/{path}/comment\"` with the anchor data and body\n- htmx swaps in the updated comment thread below the block\n\n**Comment thread rendering:**\n- Existing comments render as a collapsible thread below their anchored block\n- Each comment shows: author, timestamp, body, resolve button, delete button\n- Resolved comments are visually dimmed but still visible (toggleable)\n- Orphaned comments (anchor lost) render at the section heading level with a warning indicator\n\n**Live updates via SSE:**\n- When a comment is added/resolved/deleted, the file watcher detects the `comments.yaml` change\n- SSE pushes an update event, htmx swaps in the refreshed comment thread\n\n**Styling:**\n- Comment thread background: subtle tint (like GitHub's yellow)\n- Gutter button: unobtrusive, appears only on hover\n- Follow existing dark/light theme tokens\n",
                      "results": "\nImplemented the full comment UI across two template files:\n\n**`task_node.html`** -- Added `data-section` attributes to section wrapper divs (both named and extra sections) so JavaScript can identify which section a commentable block belongs to.\n\n**`base.html`** -- All changes in the `\u003cscript\u003e` block:\n\n1. **`renderMarkdown(text, sectionName)`** -- Extended with optional `sectionName` parameter. When provided, post-processes the rendered HTML to wrap each top-level block element (P, UL, OL, PRE, BLOCKQUOTE, TABLE, H1-H6) in a `.commentable-block` div with `data-section` and `data-block` attributes, plus a `+` gutter button.\n\n2. **`toggleSection()`** -- Modified to read `data-section` from the parent wrapper and pass it to `renderMarkdown()`. After rendering, calls `loadComments()` to fetch and display existing comments inline.\n\n3. **`showCommentForm(btn)`** -- Creates an inline form (textarea + Comment/Cancel buttons) below the block. On submit, POSTs to `/api/task/{path}/comment` with section, block_index, text_preview (first 60 chars), and body. On success, removes form and reloads comments.\n\n4. **`loadComments(taskPath)`** -- Fetches all comments from `/api/task/{path}/comments`, groups them by section+block_index, finds the matching `.commentable-block` elements, and appends rendered threads. Orphaned comments (no matching block in DOM) render at the section level with a `.comment-orphan-warning` indicator.\n\n5. **`renderCommentThread(comments, taskPath)`** -- Builds a `.comment-thread` div with `.comment-item` entries showing author, timestamp, body, Resolve/Unresolve button, and Delete button. Resolved comments get the `.comment-resolved` class.\n\n6. **`resolveComment()` / `deleteComment()`** -- PATCH and DELETE to the API, then reload comments.\n\n7. **SSE listener** -- Listens for `htmx:sseMessage` events. When a `task:{path}` event fires and the task has open sections, re-fetches comments after a 200                           "body": "\n## Objective\n\nAllow users to edit existing comments in-place. Add an Edit button alongside Resolve/Delete on each comment. Clicking Edit replaces the comment body with an editable textarea pre-filled with the current text, with Save/Cancel controls. On save, PATCH the comment body via the API and re-render the thread (comment #2).\n\n## Results\n\n### Server-side changes\n\n- Added `edit_comment(task_dir, comment_id, body)` function to [_comments.py](skills/task-system/scripts/_comments.py) that updates a comment's body text and saves to `comments.yaml`.\n- Extended the PATCH route in [plan_dashboard.py](skills/task-system/scripts/plan_dashboard.py) to accept an optional JSON body with `{\"body\": \"...\"}`. When present, it calls `edit_comment` instead of `resolve_comment`. Without a body (or empty JSON), it falls back to the existing resolve-toggle behavior, preserving backward compatibility.\n\n### Frontend changes\n\n- Added Edit button to each comment in `renderCommentThread` in [base.html](skills/task-system/scripts/templates/base.html), positioned before Resolve and Delete.\n- `startEditComment` function: hides the body text, inserts a pre-filled textarea and Save/Cancel buttons. Save sends `PATCH /api/task/{path}/comment/{id}` with the new body. Cancel restores the original text.\n- Edit textarea supports the same keyboard shortcuts as the new-comment form: Cmd/Ctrl+Enter to save, Escape to cancel.\n\n",

                          "body": "\n## Objective\n\nRedesign the comment editing UX to follow GitHub-style patterns. Three issues to fix:\n\n**1. Button replacement during editing.** Currently `startEditComment()` hides the body and inserts a textarea + Save/Cancel, but the original Edit/Resolve/Delete action buttons remain visible. Fix: when entering edit mode, hide the actions div and show only Save/Cancel controls. On save or cancel, restore the original action buttons.\n\n**2. Single-edit mode.** Currently multiple comments can be opened for editing simultaneously. When one is saved (`saveEdit()` calls `loadComments()` which re-renders all threads), other open editors lose their state \u2014 the user perceives this as \"all of them are saved\" but actually edits are lost. Fix: track the currently-editing comment globally. When `startEditComment()` is called on a new comment, auto-save the previous edit if content changed, or cancel it if unchanged. Only one comment editor open at any time.\n\n**3. Newline display.** Comment bodies with newlines (e.g., multi-paragraph feedback) display as a single line because `body.textContent = c.body` doesn't render `\\n` in HTML. Fix: add `white-space: pre-wrap` to the `.comment-body` CSS rule so newlines display correctly.\n\nFile: `skills/task-system/scripts/templates/base.html` \u2014 JS functions `startEditComment()` (line 1147), `renderCommentThread()` (line 1061), and CSS `.comment-body` (line 514).\n\n## Results\n\nAll three changes implemented in [`base.html`](skills/task-system/scripts/templates/base.html):\n\n**1. Button replacement** ([base.html:1180](skills/task-system/scripts/templates/base.html#L1180)). On entering edit mode, the actions div (Edit/Resolve/Delete) is hidden via `actionsDiv.style.display = 'none'`. Save/Cancel controls replace it. Both `saveEdit()` and `cancelEdit()` restore the actions div on exit.\n\n**2. Single-edit mode** ([base.html:907](skills/task-system/scripts/templates/base.html#L907), [base.html:1148-1172](skills/task-system/scripts/templates/base.html#L1148)). Global `_activeCommentEdit` tracks the open editor. `_dismissActiveEdit()` closes any active editor before a new one opens: auto-saves if content changed (fire-and-forget API PATCH with local DOM text update, no `loadComments` re-render), cancels if unchanged. This avoids the race condition where `loadComments` from auto-save would destroy a newly-opened editor on the same task.\n\n**3. Newline display** ([base.html:514](skills/task-system/scripts/templates/base.html#L514)). Added `white-space: pre-wrap` to `.comment-body` CSS so `\\n` in comment bodies renders as visual line breaks.\n\nAll 53 existing dashboard tests pass.\n",

                          "is_leaf": true,
                          "body": "\n## Objective\n\nFix three related bugs in the comment gutter/form interaction: (1) the plus button is clipped/only half shown (comment #1), (2) clicking plus on a block with existing comments cycles through existing comments' resolve/delete buttons one by one before showing the new comment form (comment #4), (3) adding a comment causes the section to fold back, forcing the user to re-expand (comment #5).\n\n## Results\n\nAll three bugs fixed in [base.html](skills/task-system/scripts/templates/base.html):\n\n1. **Clipped gutter button**: Changed `.commentable-block` to use `padding-left: 28px; margin-left: -28px` so the block reserves space for the gutter button. Moved button from `left: -28px` to `left: 0` with `z-index: 1`. The button is now fully visible within the padding area instead of relying on parent overflow.\n\n2. **Form toggle cycling**: Changed `showCommentForm` from toggle behavior (remove existing form and return) to focus behavior (if a form already exists, focus its textarea). The `+` button now always either shows the form or focuses the existing one \u2014 no removal/re-creation cycle.\n\n3. **Section folding after comment**: The root cause is that saving a `comments.yaml` triggers the file watcher, which broadcasts an SSE `task:{path}` event, causing htmx to do an `outerHTML` swap of the entire task node \u2014 resetting all expand/collapse state. Fixed by adding a suppression mechanism: local comment operations (POST/PATCH/DELETE) record a timestamp in `_commentEditPaths`, and an `htmx:sseBeforeMessage` listener cancels the SSE swap for that task within a 3-second window. The client already refreshes comments via `loadComments()` after the API call succeeds, so the SSE swap is redundant.\n\n",

                          "is_leaf": true,
                          "body": "\n## Objective\n\nThe `+` gutter button on commentable blocks is clipped (only partially visible). Root cause: `.section-content` uses `overflow: hidden` for its max-height expand/collapse animation. `.commentable-block` uses `margin-left: -28px` to create space for the absolutely-positioned gutter button at `left: 0`, but this negative margin extends outside the `.section-content` overflow boundary, clipping the button.\n\nFix: Remove the negative-margin approach entirely. Instead, use padding-only positioning within `.commentable-block` so the gutter button sits inside the content flow, within the overflow boundary. The `.section-content` already has `padding-left: 20px` \u2014 increase it to accommodate the button, or keep the button inside `.commentable-block`'s own padding without any negative margin.\n\nFile: `skills/task-system/scripts/templates/base.html` \u2014 CSS lines 496-506 (`.commentable-block` and `.comment-gutter-btn` rules).\n\n## Results\n\nRemoved the negative-margin approach entirely. Three CSS changes in [`base.html`](skills/task-system/scripts/templates/base.html):\n\n1. **`.section-content`** ([line 344](skills/task-system/scripts/templates/base.html#L344)): `padding-left: 20px` -\u003e `4px`. Reduced because the commentable-block now provides its own indent via padding instead of relying on section-content padding minus negative margin.\n\n2. **`.commentable-block`** ([line 497](skills/task-system/scripts/templates/base.html#L497)): removed `margin-left: -28px`, changed `padding-left: 28px` -\u003e `24px`. The 24px padding area holds the 20px gutter button with 2px gap on each side. No content extends outside the `.section-content` overflow boundary.\n\n3. **`.comment-gutter-btn`** ([line 500](skills/task-system/scripts/templates/base.html#L500)): `left: 0` -\u003e `2px`. Centers the 20px button within the 24px padding area.\n\n**Layout math:** Net text indent is `4px (section-content) + 24px (commentable-block) = 28px`, compared to the original `20px (section) - 28px (margin) + 28px (padding) = 20px`. An 8px increase \u2014 barely noticeable. The gutter button sits at `4px + 2px = 6px` from the section-content border edge, fully inside the padding box and visible under `overflow: hidden`.\n\nAll 53 existing dashboard tests pass.\n",

                        {
                          "path": "task-system/dashboard/live-server/comments/comment-ui/tree-comment-badges",
                          "title": "Bubble comment badges up through collapsed tree nodes",
                          "status": "implemented",
                          "effective_status": "implemented",
                          "review_status": "approved",
                          "integration_status": "~",
                          "depends_on": [],
                          "tags": [],
                          "script": "",
                          "input": [],
                          "output": [],
                          "created": "2026-05-25",
                          "updated": "2026-05-25",
                          "is_leaf": true,
                          "body": "\n## Objective\n\nCurrently, unresolved comment badges only appear on section toggles (e.g., \"Objective 2\") inside an expanded task body. When the task node or any ancestor is collapsed, the badge disappears \u2014 the user has no way to know that comments exist deeper in the tree without expanding every node.\n\nFix: bubble comment badges up through the tree so they appear on the **deepest collapsed ancestor** that contains tasks with unresolved comments. When a user collapses a subtree, the comment count aggregates onto that node's task row. When they expand it, the badge moves down to the next collapsed level (or to the section toggles if the task body is fully expanded).\n\n**Requires two changes:**\n\n**1. Server: tree-wide comment summary endpoint.** Add `GET /api/comments/summary` to `plan_dashboard.py`. Walk the entire plan tree, check each task directory for `comments.yaml`, count unresolved comments, and return `{taskPath: unresolvedCount}` for all tasks with count \u003e 0. The frontend currently fetches comments per-task only on expand \u2014 it cannot know about comments in collapsed subtrees without this endpoint.\n\n**2. Client: badge bubbling logic.** Add `updateTreeCommentBadges()` to `base.html`:\n- Fetch `/api/comments/summary` to get `{taskPath: count}` for all tasks with unresolved comments.\n- For each task path with comments, find its `.task-node` in the DOM. Walk up the DOM through ancestor `.task-node` elements. Find the **deepest ancestor whose `.task-body` is not `.open`** (i.e., collapsed). That is the display target.\n- If the task itself is collapsed (body not open), the badge goes on its own `.task-row`.\n- If the task is expanded and sections are visible, section-level badges handle it (existing `updateSectionBadges` behavior).\n- Aggregate: if multiple descendant tasks have comments and they all bubble up to the same collapsed ancestor, sum their counts into one badge on that ancestor's row.\n- Use the same `.section-comment-badge` CSS class (or a `.tree-comment-badge` variant) on the task row, positioned after the status badge or progress indicator.\n\n**Call sites \u2014 when to recalculate:**\n- On initial page load (after DOM ready).\n- On `toggleTask()` \u2014 expanding or collapsing a node changes which ancestor is the \"deepest collapsed,\" so badges need to shift.\n- On SSE `comments.yaml` change events \u2014 re-fetch `/api/comments/summary` and recalculate.\n\n**Edge cases:**\n- Multiple tasks with comments at different depths under the same collapsed ancestor \u2192 sum into one badge.\n- A task has comments in multiple sections (e.g., Objective has 2, Results has 1) \u2192 task-level count is 3.\n- Comments exist but are all resolved \u2192 no badge (count = 0).\n- Task is fully expanded with sections visible \u2192 no tree-level badge, section badges handle it (existing behavior).\n\nFiles:\n- `skills/task-system/scripts/plan_dashboard.py` \u2014 new `/api/comments/summary` endpoint\n- `skills/task-system/scripts/templates/base.html` \u2014 `updateTreeCommentBadges()` function, CSS for tree-level badge, call sites in `toggleTask()` and SSE handler\n\n## Results\n\n### Server: `GET /api/comments/summary`\nAdded endpoint at [plan_dashboard.py:422-439](skills/task-system/scripts/plan_dashboard.py#L422). Recursively walks `_root_task` tree, calls `load_comments()` on each task's `dir_path`, counts unresolved comments, and returns `{taskPath: unresolvedCount}` for tasks with count \u003e 0. Guarded by `_COMMENTS_AVAILABLE` and `_root_task` checks.\n\n### Client: `updateTreeCommentBadges()`\nAdded function at [base.html:1099-1145](skills/task-system/scripts/templates/base.html#L1099). Logic:\n- Fetches `/api/comments/summary` for all unresolved counts\n- For each task path with comments, finds its `.task-node` in the DOM. If the node isn't rendered (lazy-loaded depth \u003e= 2), walks up path segments (`split('/')` + `pop()`) until finding a rendered ancestor\n- If the task's `.task-body` is open, skips (section-level badges handle it)\n- Otherwise, walks up ancestor `.task-node` elements to find the deepest collapsed ancestor\n- Aggregates counts from multiple descendants onto the same collapsed ancestor via a `Map`\n- Renders `.tree-comment-badge` spans on the target `.task-row` elements\n- Clears all existing `.tree-comment-badge` elements before recalculating\n\n### CSS\nShared base styling for `.section-comment-badge` and `.tree-comment-badge` (accent-background pill). Section badges keep `margin-left: auto` (right-aligned in section toggles); tree badges use `margin-left: 4px` (inline after status badge/progress in task rows). Badge is inserted after `.task-progress` or `.badge` element in the row rather than appended at the end.\n\n### Call sites\n- `DOMContentLoaded` event listener for initial page load\n- At the end of `toggleTask()` after expand/collapse\n- SSE `task:` message handler (300ms delay to let swap render first)\n\n### Tests\n4 new tests added to [test_dashboard.py](skills/task-system/scripts/test_dashboard.py):\n- `test_comments_summary_empty` \u2014 returns `{}` with no comments\n- `test_comments_summary_counts_unresolved` \u2014 correct counts across multiple tasks\n- `test_comments_summary_excludes_resolved` \u2014 resolved comments not counted\n- `test_comments_summary_nested_tasks` \u2014 includes child task comments\n\nAll 57 tests pass (53 existing + 4 new).\n",
                          "objective": "\nCurrently, unresolved comment badges only appear on section toggles (e.g., \"Objective 2\") inside an expanded task body. When the task node or any ancestor is collapsed, the badge disappears \u2014 the user has no way to know that comments exist deeper in the tree without expanding every node.\n\nFix: bubble comment badges up through the tree so they appear on the **deepest collapsed ancestor** that contains tasks with unresolved comments. When a user collapses a subtree, the comment count aggregates onto that node's task row. When they expand it, the badge moves down to the next collapsed level (or to the section toggles if the task body is fully expanded).\n\n**Requires two changes:**\n\n**1. Server: tree-wide comment summary endpoint.** Add `GET /api/comments/summary` to `plan_dashboard.py`. Walk the entire plan tree, check each task directory for `comments.yaml`, count unresolved comments, and return `{taskPath: unresolvedCount}` for all tasks with count \u003e 0. The frontend currently fetches comments per-task only on expand \u2014 it cannot know about comments in collapsed subtrees without this endpoint.\n\n**2. Client: badge bubbling logic.** Add `updateTreeCommentBadges()` to `base.html`:\n- Fetch `/api/comments/summary` to get `{taskPath: count}` for all tasks with unresolved comments.\n- For each task path with comments, find its `.task-node` in the DOM. Walk up the DOM through ancestor `.task-node` elements. Find the **deepest ancestor whose `.task-body` is not `.open`** (i.e., collapsed). That is the display target.\n- If the task itself is collapsed (body not open), the badge goes on its own `.task-row`.\n- If the task is expanded and sections are visible, section-level badges handle it (existing `updateSectionBadges` behavior).\n- Aggregate: if multiple descendant tasks have comments and they all bubble up to the same collapsed ancestor, sum their counts into one badge on that ancestor's row.\n- Use the same `.section-comment-badge` CSS class (or a `.tree-comment-badge` variant) on the task row, positioned after the status badge or progress indicator.\n\n**Call sites \u2014 when to recalculate:**\n- On initial page load (after DOM ready).\n- On `toggleTask()` \u2014 expanding or collapsing a node changes which ancestor is the \"deepest collapsed,\" so badges need to shift.\n- On SSE `comments.yaml` change events \u2014 re-fetch `/api/comments/summary` and recalculate.\n\n**Edge cases:**\n- Multiple tasks with comments at different depths under the same collapsed ancestor \u2192 sum into one badge.\n- A task has comments in multiple sections (e.g., Objective has 2, Results has 1) \u2192 task-level count is 3.\n- Comments exist but are all resolved \u2192 no badge (count = 0).\n- Task is fully expanded with sections visible \u2192 no tree-level badge, section badges handle it (existing behavior).\n\nFiles:\n- `skills/task-system/scripts/plan_dashboard.py` \u2014 new `/api/comments/summary` endpoint\n- `skills/task-system/scripts/templates/base.html` \u2014 `updateTreeCommentBadges()` function, CSS for tree-level badge, call sites in `toggleTask()` and SSE handler\n",

                      "body": "\n## Objective\n\nDefine the sidecar YAML format for comments and implement the server-side routes for creating, listing, and resolving comments.\n\n**Sidecar format** \u2014 `comments.yaml` next to each `task.md`:\n```yaml\n- id: 1\n  author: Julie\n  timestamp: 2026-05-24T10:30:00\n  resolved: false\n  anchor:\n    section: \"Objective\"\n    block_index: 2\n    text_preview: \"The server should work as\"\n  body: \"Do we really need configurable root? YAGNI.\"\n```\n\n**Fields:**\n- `id` \u2014 auto-incrementing integer within the file\n- `author` \u2014 user name (configurable, default from git config)\n- `timestamp` \u2014 ISO 8601\n- `resolved` \u2014 boolean, toggleable\n- `anchor.section` \u2014 the `## Heading` this comment is attached to\n- `anchor.block_index` \u2014 0-indexed block within the section (paragraph, list item, code block, etc.)\n- `anchor.text_preview` \u2014 first ~60 chars of the block text, used for fuzzy re-anchoring when content shifts\n- `body` \u2014 comment text (plain text or markdown)\n\n**Server routes:**\n- `POST /task/{path}/comment` \u2014 create a comment (body: `{section, block_index, text_preview, body}`)\n- `GET /task/{path}/comments` \u2014 list all comments for a task (JSON)\n- `PATCH /task/{path}/comment/{id}` \u2014 toggle resolved status\n- `DELETE /task/{path}/comment/{id}` \u2014 delete a comment\n\n**Anchor re-resolution:**\n- On read, verify `block_index` still matches `text_preview`\n- If mismatch, scan blocks in the section for a fuzzy match (substring containment) and update the index\n- If no match found, mark the comment as `orphaned: true` and render it at the section level\n\n## Results\n\nImplemented in [`_comments.py`](../../../../../skills/task-system/scripts/_comments.py):\n\n- `Comment` / `CommentAnchor` dataclasses with `orphaned` as a runtime-only flag (not persisted to YAML)\n- `load_comments` / `save_comments` \u2014 YAML sidecar I/O with `yaml.safe_load` / `yaml.dump`                   "body": "\n## Objective\n\nWire up filesystem watching and Server-Sent Events so the dashboard updates automatically when `.plan/` files change on disk.\n\n**Watcher:**\n- Use `watchfiles.awatch()` to monitor `.plan/` recursively for `task.md` changes\n- Run the watcher as a FastAPI background task (lifespan event)\n- On change: identify the changed task path, re-parse that single `task.md`, update the in-memory index\n- Debounce rapid changes (agents rewriting a file may trigger multiple events) \u2014 ~200ms window\n\n**SSE endpoint:**\n- `GET /events` returns a `text/event-stream` response\n- Each connected browser holds an open SSE connection\n- When a task changes, broadcast an SSE event: `event: task-updated\\ndata: \u003crendered HTML fragment for the changed task\u003e\\n\\n`\n- htmx's SSE extension picks this up and swaps the fragment into the matching `sse-swap` target\n- Also broadcast `event: summary-updated\\ndata: \u003crendered summary bar\u003e\\n\\n` so the status counts refresh\n\n**Edge cases:**\n- New task directory created \u2192 add to index, broadcast parent re-render (new child appears)\n- Task directory deleted \u2192 remove from index, broadcast parent re-render\n- SSE reconnection: browser auto-retries (SSE built-in), server should handle multiple concurrent connections via an async broadcast channel\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**Watcher:** `_watch_plan_root()` uses `watchfiles.awatch(PLAN_ROOT)` as a background task started in the FastAPI lifespan. Filters for `task.md` and `comments.yaml` only. 200ms debounce via `asyncio.sleep(0.2)` after receiving changes.\n\n**SSE broadcast:** `_broadcast(event, data)` sends SSE-formatted messages to all connected clients via `set[asyncio.Queue]`. Each `/events` connection gets its own queue (maxsize=256). Dead queues (full) are pruned on broadcast.\n\n**Change handling:**\n- Modified `task.md` / `comments.yaml` -\u003e `rebuild_task(path)` + broadcast `task-updated` (HTML fragment) + `summary-updated`\n- New/deleted `task.md` -\u003e `rebuild_tree()` + broadcast `full-reload`\n\n**SSE events emitted:**\n- `event: task-updated` with `data: {\"path\": \"...\", \"html\": \"...\"}`\n- `event: summary-updated` with `data: \u003crendered summary HTML\u003e`\n- `event: full-reload` with `data: {}`\n\n",

                  "body": "\n## Objective\n\nrebuild_task() in plan_dashboard.py (lines 81-106) preserves stale children on partial updates. When a task.md modification event fires, the function re-parses the task but does updated.children = existing.children (line 100), blindly preserving the old children list. If subtask directories were created after the server started, or the watcher missed the Change.added FSEvents, those children are never discovered \u2014 the in-memory tree stays stale and the dashboard never renders them.\n\nFix: after re-parsing the task, re-walk the task directory for child subdirectories containing task.md. Build new child Task objects for any directories not already in the existing children list, and add them to the task index. Remove children whose directories no longer exist. Then replace the node in the tree as before. This makes every partial update self-healing \u2014 even if the watcher misses a structural event, the next modification to any ancestor discovers the new or removed children.\n\nAlso broadcast a full-reload SSE event (not just the task fragment) when the child set changes, so the frontend re-renders the full tree structure.\n\nFile: skills/task-system/scripts/plan_dashboard.py, function rebuild_task() at line 81.\n\n## Results\n\n**Changed files:**\n- [plan_dashboard.py:81](skills/task-system/scripts/plan_dashboard.py#L81) -- `rebuild_task()` rewritten\n- [plan_dashboard.py:127](skills/task-system/scripts/plan_dashboard.py#L127) -- new `_remove_from_index()` helper\n- [plan_dashboard.py:218](skills/task-system/scripts/plan_dashboard.py#L218) -- `_watch_plan_root()` updated to handle `(task, children_changed)` tuple\n- [test_dashboard.py:283](skills/task-system/scripts/test_dashboard.py#L283) -- existing tests updated, 3 new tests added\n\n**What changed in `rebuild_task()`:**\n\n1. Return signature changed from `Task | None` to `tuple[Task | None, bool]`. The bool (`children_changed`) is `True` when the set of child directory paths changed since the last index snapshot.\n2. Instead of `updated.children = existing.children`, the function calls `_walk_children(task_dir, PLAN_ROOT)` to re-discover child subdirectories from disk. This uses the same `_walk_children` already used by `walk_plan` for the initial tree build, so topological sorting and recursive parsing are preserved.\n3. Stale children (directories that no longer exist) are removed from `_task_index` via the new `_remove_from_index()` recursive helper. New children are added via `_build_index()`.\n4. The caller in `_watch_plan_root()` unpacks the tuple. If any task's children changed during the batch, it broadcasts `full-reload` instead of per-task fragment SSE events.\n\n**New tests (all pass):**\n- `test_rebuild_task_discovers_new_children` -- child created after initial build is found by rebuild\n- `test_rebuild_task_removes_deleted_children` -- child removed from disk is dropped from tree and index\n- `test_rebuild_task_discovers_existing_children` -- (renamed from `test_rebuild_task_preserves_children`) existing children are re-discovered correctly with `children_changed=False`\n\n**Test results:** 53/53 pass in `test_dashboard.py`, 92/92 pass in `test_task_system.py`.\n",
