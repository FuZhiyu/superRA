                  "is_leaf": true,
                  "body": "\n## Objective\n\nBuild the FastAPI application that serves the dashboard. Reuse the existing task-tree parser from `plan_dashboard.py` (or `plan_task_io.py`).\n\n**Routes:**\n- `GET /` \u2014 serves the full dashboard page (base template + top-level task skeleton)\n- `GET /task/{path:path}` \u2014 returns an HTML fragment for a task node and its direct children (htmx partial)\n- `GET /events` \u2014 SSE endpoint for live updates (see `live-reload` subtask)\n- `GET /static/{file}` \u2014 serves shared CSS/JS if extracted (optional)\n\n**Data layer:**\n- On startup, walk `.plan/` and parse `task.md` files into the existing task-tree data structure\n- Keep an in-memory task index (`dict[path, TaskNode]`) for fast lookups\n- On file-change events (from the watcher), re-parse only the changed `task.md` and update the index\n- Parse task body sections (objective, results, decisions, review notes) for section-level rendering\n\n**Key constraints:**\n- The server module should be importable and runnable via `uvicorn` programmatically\n- Reuse existing `plan_task_io.py` parsing logic \u2014 don't duplicate the YAML frontmatter parser\n- Task tree root is configurable (default: `.plan/` in cwd) so subtrees can be served independently\n\n## Results\n\nImplemented in [`plan_dashboard.py`](skills/task-system/scripts/plan_dashboard.py).\n\n**Routes implemented:**\n- `GET /` \u2014 renders `base.html` with `root_task`, `all_tasks`, `project_root`\n- `GET /task/{path:path}` \u2014 renders `task_children.html` fragment for htmx expand\n- `GET /events` \u2014 SSE endpoint with `text/event-stream`, per-client `asyncio.Queue` broadcast\n- `GET /files/{path:path}` \u2014 serves project files for image embeds (path-traversal guarded)\n- `POST /api/task/{path:path}/comment` \u2014 create comment\n- `GET /api/task/{path:path}/comments` \u2014 list comments\n- `PATCH /api/task/{path:path}/comment/{comment_id}` \u2014 toggle resolved\n- `DELETE /api/task/{path:path}/comment/{comment_id}` \u2014 delete comment\n\n**Data layer:**\n- `rebuild_tree()` \u2014 full re-walk, builds `_task_index: dict[str, Task]`\n- `rebuild_task(path)` \u2014 re-parse single task.md, patch in-tree, update index\n- `_find_task(path)` \u2014 O(1) lookup\n\n**Note:** Comment routes use `/api/` prefix instead of the spec's `/task/{path}/comments` to avoid ambiguity with FastAPI's greedy `{path:path}` parameter. The catch-all `/task/{path:path}` route is registered last.\n\n## Decisions\n\n- Comment routes moved to `/api/task/...` prefix. The `{path:path}` parameter in FastAPI is greedy and would match `/task/server/comments` as `path=\"server/comments\"` before the more specific comment route. Using an `/api/` prefix avoids this ambiguity cleanly.\n- `_comments.py` import is wrapped in try/except so the server works even if the comments module is not yet available.\n- Jinja2 environment is lazy-initialized (not at import time) so the module can be imported for testing without templates present.\n",

                  "body": "\n## Results\n\nCreated 6 Jinja2 templates under [`skills/task-system/scripts/templates/`](skills/task-system/scripts/templates/):\n\n1. **`base.html`** (25KB) -- Full page shell with all CSS ported from the static dashboard (97 selectors, light/dark themes), plus 11 comment-related CSS rules. Includes CDN script tags (htmx 2.x, htmx SSE extension, markdown-it 14, mermaid 11), Google Fonts (Source Serif 4, IBM Plex Mono), sticky header bar with summary stats and controls, SSE connection via `hx-ext=\"sse\"` on the main content div, and all JavaScript for theme toggle, view switching, search/filter, markdown rendering with link rewriting, task expand/collapse, section expand/collapse with lazy markdown rendering, and kanban card navigation.\n\n2. **`task_node.html`** -- Jinja2 macro `render_task_node(task, project_root, depth=0)`. Renders task row (toggle, slug, title, status badge), collapsible body with section toggles (Objective, Results, Decisions, Review Notes, plus any extra `##` sections), metadata pills (depends_on, script, tags, input, output), and children container. Inline children rendered for depth \u003c 2; deeper children lazy-loaded via htmx. Each node has `sse-swap=\"task:{path}\"` for live updates. Raw markdown stored in `\u003ctemplate\u003e` tags, rendered client-side by markdown-it on first section expand.\n\n3. **`task_children.html`** -- Partial fragment returned by `GET /task/{path}`. Imports and uses the `render_task_node` macro at depth=2 (triggering lazy-load for further nesting).\n\n4. **`summary_bar.html`** -- Stats fragment showing leaf count, group count, approved ratio, progress bar, and last updated date. Swapped via SSE `summary-updated` events.\n\n5. **`kanban.html`** -- Kanban board with 5 status columns (Not Started, In Progress, Implemented, Revise, Approved). Shows only leaf tasks, filtered by `effective_status()`. Cards clickable to navigate to tree view.\n\n6. **`dag.html`** -- Mermaid DAG diagram generated from task dependencies with status-colored nodes.\n\n**Verification:** All 6 templates parse as valid Jinja2 and render successfully with mock Task objects. CSS cross-check confirms 0 missing selectors from the original dashboard.\n\n## Revision Notes\n\n**Lazy-load broken for depth \u003e= 3 (htmx v2 script execution).** The recursive lazy-load mechanism for deeply nested tasks is broken. `task_node.html` (lines 138-146) injects an inline `\u003cscript\u003e` tag to set `node.dataset.needsLoad = 'true'` on nodes at depth \u003e= 2, enabling their children to be fetched via `htmx.ajax('GET', '/task/' + path)` on first expand. However, htmx v2 does **not** execute `\u003cscript\u003e` tags in swapped content by default (security change from v1). When a parent node is lazy-loaded (e.g., expanding `comments` fetches `/task/comments` and injects its children including `comment-ui` via `innerHTML` swap), the `\u003cscript\u003e` in the injected `comment-ui` node never executes. Result: `needsLoad` is never set, so clicking `comment-ui` expands its body but never triggers the fetch for its own children \u2014 the 4 subtasks are invisible. This affects any task at depth \u003e= 3 in the tree (e.g., `task-system \u003e dashboard \u003e live-server \u003e comments \u003e comment-ui \u003e [children]`). Depths 0-1 are unaffected (inline-rendered). Depth 2 works because the initial page template renders the `\u003cscript\u003e` server-side (not via htmx swap). Fix options: (a) set `htmx.config.allowScriptTags = true`, (b) replace the `\u003cscript\u003e` approach with an `htmx:afterSwap` event listener that scans injected nodes for `[data-needs-load]` attributes, or (c) move the `needsLoad` flag to a `data-` attribute on the HTML element itself (no script needed) and scan after swap.\n\n## Decisions\n\n- Markdown content stored in `\u003ctemplate\u003e` tags inside `rendered-md` divs, rendered client-side by markdown-it on first section expand (lazy rendering).\n- Link rewriting implemented in a `renderMarkdown()` JS function: relative paths become `vscode://file/{project_root}/{path}`, relative image srcs become `/files/{src}`.\n- DAG and kanban views fetched from server endpoints (`/dag`, `/kanban`) rather than rendered inline, keeping the initial page load lightweight.\n- Children at depth \u003e= 2 lazy-loaded via htmx `GET /task/{path}` on first expand; depths 0-1 rendered inline for immediate visibility.\n- Search/filter operates client-side by toggling `.hidden` class on `.task-node` elements, with descendant-aware matching\n\n## Objective\n\nCreate the Jinja2 templates that render the dashboard UI. Port the visual design from the existing static HTML dashboard (typography, palette, dark/light mode) into reusable templates.\n\n**Templates:**\n- `base.html` \u2014 full page shell: header bar, theme toggle, view switcher, summary bar, CDN script tags (htmx, mermaid, markdown-it), SSE connection setup\n- `task_node.html` \u2014 single task row fragment: title, status badge, expand/collapse toggle, `hx-get` for lazy children loading, `sse-swap` for live updates. This is the htmx partial returned by `GET /task/{path}`\n- `task_detail.html` \u2014 expanded task body: collapsible sections (objective, results, decisions, review notes) rendered via markdown-it\n- `summary_bar.html` \u2014 status counts and progress bar, refreshable via SSE\n- `kanban.html` \u2014 kanban board view (htmx partial)\n- `dag.html` \u2014 mermaid DAG view (htmx partial)\n\n**Design:**\n- Port existing CSS variables (light/dark tokens, status colors, typography) from `dashboard.html`\n- Tree connector lines via `border-left` (existing pattern)\n- Progressive disclosure: title row \u2192 children + section toggles \u2192 rendered markdown\n- Search and status filter in the header, using `hx-get` with query params to fetch filtered results\n- Breadcrumb showing current view scope (useful when serving a subtree)\n\n**htmx patterns:**\n- `hx-get=\"/task/{path}\"` on expand toggle \u2014 fetches children fragment\n- `hx-target=\"#{path}-children\"` \u2014 swaps into the children container\n- `hx-swap=\"innerHTML\"` \u2014 replace children content\n- `hx-ext=\"sse\"` + `sse-connect=\"/events\"` on the main container\n- `sse-swap=\"task:{path}\"` on each task node \u2014 auto-update on change\n\n**Markdown link resolution:**\n- Relative file paths in markdown links (`[text](path/to/file.py:42)`) rewrite to `vscode://file/{absolute_path}:42` URIs \u2014 click to open in VSCode at that line\n- Heuristic: if href doesn't start with `http://`, `https://`, or `#`, treat as a file path\n- Image embeds (`![alt](path/to/fig.png)`) rewrite `src` to `/files/path/to/fig.png`, served by a `StaticFiles` mount on the project root\n",

          "body": "\n## Objective\n\nRedesign the superRA planning workflow to be domain-neutral, harness-independent, exploration-first, and existing-plan-aware. The current workflow is tightly coupled to harness plan mode, loses information during format migration, and lacks exploration and existing-plan-check phases. The new design borrows exploration and structured-planning patterns from Claude Code and Codex plan modes, adapted for multi-domain research workflows.\n\n**Five concerns in scope:**\n1. **Core workflow redesign** \u2014 New 5-phase structure: Task Tree Discovery \u2192 Exploration \u2192 Domain Setup & Scope \u2192 Design & Task Decomposition \u2192 Review & Commit. Domain-neutral core with domain skills plugging in at Phase 2. Discovery assesses relevance to existing tasks (only offers update when related). Task tree presented to user for review before commit.\n2. **Plan update mechanism** \u2014 Drop `## Decisions` log (too bloated). Replace with: (a) self-sufficient objective rewrites (full context, not patches), and (b) `## Revision Notes` as a temporary delta signal (what changed, significance) \u2014 same cleanup lifecycle as review notes.\n3. **Harness plan mode compatibility** \u2014 Reference file teaching agents to use harness plan mode productively while outputting directly to `.plan/` at exit. In plan mode, present a flattened view of the planned `.plan/` changes for user review. Eliminates the two-step migration that loses information.\n4. **Terminology convention** \u2014 \"Plan\" is the verb (the planning process), not the noun. Everything in `.plan/` is a task. `.plan/` is \"the task tree.\" Document this in CLAUDE.md, planning-workflow SKILL.md, and task-system references.\n5. **PLAN.md remnant cleanup** \u2014 Complete the migration from PLAN.md/RESULTS.md references to `.plan/` task files across all remaining skill references (main-agent, domain planning refs, direct-mode refs, using-superRA).\n\n**Conventions:**\n- Planning-workflow SKILL.md is the primary file; references stay one level deep\n- Domain skills' planning references (`econ-data-analysis/references/planning.md`, etc.) continue to plug in unchanged at Phase 2 \u2014 only their PLAN.md text references get updated\n- Direct-mode implementer/reviewer refs are generated files \u2014 update canonical agent specs then regenerate\n- Follow the DRY/Necessity gate from CLAUDE.md for every new line\n\n## Results\n\n",

d is the primary file; references stay one level deep\n- Domain skills' planning references (`econ-data-analysis/references/planning.md`, etc.) continue to plug in unchanged at Phase 2 \u2014 only their PLAN.md text references get updated\n- Direct-mode implementer/reviewer refs are generated files \u2014 update canonical agent specs then regenerate\n- Follow the DRY/Necessity gate from CLAUDE.md for every new line\n",

              "body": "\n## Objective\n\nCreate `skills/planning-workflow/references/harness-plan-mode.md` \u2014 a reference file that teaches agents how to use harness-provided plan mode (Claude Code, Codex) productively while outputting directly to `.plan/` at exit.\n\n### Problem This Solves\nWhen harness plan mode is active, the agent is constrained to write only a specific plan file in a harness-prescribed format. Currently, the agent creates a plan in that format and then must migrate it to the `.plan/` task tree \u2014 a two-step process that loses information (task dependencies, frontmatter fields, structured objectives get flattened).\n\n### Design\nThe reference teaches a single principle: **harness plan mode is your exploration and approval environment; `.plan/` is the output.**\n\n**During plan mode (read-only):**\n- Use harness tools productively: Explore subagents for broad context, file reads for project understanding\n- Run Phases 0\u20132 of the planning workflow (Discovery, Exploration, Domain Setup) within the read-only constraint\n- Write a **flattened view of the planned `.plan/` changes** in the harness plan file \u2014 showing each task with its title, objective, dependencies, and placement in the tree. This is NOT the authoritative plan, but it presents the same information the user would see after `.plan/` creation, in a readable flat format suitable for review and approval in plan mode\n\n**At exit from plan mode:**\n- The agent returns to normal mode with full write access\n- Create `.plan/` task tree directly from the agent's full understanding (conversation context, exploration findings, design decisions)\n- No migration needed \u2014 the plan file was never the authoritative plan\n\n**Harness plan file template:**\nProvide a structured template that mirrors what `.plan/` will contain. For each planned task: path in tree, title, objective (full text), `depends_on`, `script`/`input`/`output` when known. Include the tree visualization and               "body": "\n## Objective\n\nRewrite `skills/planning-workflow/SKILL.md` with a new 5-phase structure that is domain-neutral, exploration-first, and existing-plan-aware.\n\n### New Phase Structure\n\n**Phase 0: Task Tree Discovery** \u2014 Check for existing `.plan/` in working directory. If found, read the tree, summarize current state, and assess whether the new work relates to any existing root-level task. If related, recommend updating the existing task (routes to \u00a7User Feedback and Changing Plans) and let the user confirm or redirect. If not related, create a new root-level task. If no existing tasks, skip to Phase 1. Also check for legacy PLAN.md and offer migration.\n\nWhen adding to an existing tree, Phase 0 determines **where in the tree** the new work belongs \u2014 new root-level task (independent workstream) or subtask under an existing task. Present the existing tree to the user and let them decide placement.\n\n**Phase 1: Exploration** \u2014 Domain-neutral context exploration before planning. Read project structure, existing code, data directories, documentation, CLAUDE.md/README.md files, git history for relevant prior work. Depth is adaptive: lightweight scan for simple/known work, deeper systematic exploration for complex/unfamiliar projects. This is where domain skills' hard-gate data gathering begins (data inventory exploration, model primitives survey, manuscript assessment) \u2014 but the phase itself is domain-neutral.\n\n**Phase 2: Domain Setup & Scope** \u2014 Identify domain vertical (unchanged routing table), load domain skill's planning reference, satisfy hard gates. Scope check: split independent workstreams. (Merges current Phase 1 + Phase 2, reordered after exploration.)\n\n**Phase 3: Design & Task Decomposition** \u2014 Map artifact pipeline, walk project conventions (cache in root task.md `## Conventions`), create/update `.plan/` task tree. Pipeline file for multi-artifact work. References `task-system/references/planning.md` for objective writing and task splitting. (Merges current Phase 3 + Phase 4.)\n\n**Phase 4: Review & Commit** \u2014 Self-review checklist. Then present the plan to the user for review before committing: show the task tree (via `task_query.py --tree`), highlight key design decisions, and ask for approval. Commit only after user approval. Hand off to implementation-workflow.\n\n### Plan Updates and Revision Notes\n\n**Drop `## Decisions` log.** Methodology decisions are folded into the task objective directly. The objective is always self-sufficient \u2014 rewritten fully on every update, not patched.\n\n**Revision notes for plan changes.** When a task is updated (scope change, methodology pivot, added/removed work), add a `## Revision Notes` section with a brief delta: what changed, why, and how significant (trivial/mechanical vs substantive). This signals to the next agent whether they need to re-explore or can proceed directly. Revision notes follow the same cleanup lifecycle as review notes \u2014 cleaned out when the task is re-implemented and approved.\n\n**Update discipline:** When updating a task objective, rewrite it to be fully self-sufficient with the new scope. Don't just change a number \u2014 include all planning context. The revision note carries the delta signal; the objective carries the full current state.\n\n### Sections to Keep (adapt as needed)\n- Retroactive Plan Creation\n- Living Plan and Results\n- .plan/ Is the Task Tracker\n- User Feedback and Changing Plans (adapted: drop `## Decisions` protocol, add revision notes)\n- Remember\n\n### Design Principles\n\n**\"Plan\" is the verb, not the noun.** \"Planning\" is the process (this workflow). Everything in `.plan/` is a **task** \u2014 root-level tasks scope a workstream, nested tasks are dispatchable work. `.plan/` is \"the task tree,\" not \"the plan.\" There is no separate \"plan\" artifact type. This convention must be reflected throughout the SKILL.md language: use \"task tree\" not \"plan\" when referring to the `.plan/` artifact, \"planning\" not \"plan creation\" when referring to the process.\n\nAlso add this convention to:\n- `CLAUDE.md` contributor guidelines (under a terminology or conventions section)\n- `task-system/references/planning.md` (terminology note at the top)\n\nOther principles:\n- Core phases are domain-neutral \u2014 no assumption of software engineering, data analysis, or any specific domain\n- Domain skills plug in at Phase 2 with their hard gates and templates\n- Exploration depth is the agent's judgment call, not a mechanical rule \u2014 teach the mechanism, not a contingency tree\n- Borrow the exploration-before-design spirit from Claude Code plan mode, adapted for research: understand data, code, papers, conventions before designing tasks\n- Phase 0 ensures we never create duplicate tasks or lose track of existing work\n\n## Results\n\n### Files Modified\n\n- [`skills/planning-workflow/SKILL.md`](skills/planning-workflow/SKILL.md) \u2014 Complete rewrite. New 5-phase structure (Phase 0-4): Task Tree Discovery, Exploration, Domain Setup & Scope, Design & Task Decomposition, Review & Commit. Dropped `## Decisions` log from task-tree creation and change protocol. Added `## Revision Notes` mechanism. Renamed sections to use \"task tree\" terminology throughout. Kept and adapted: Retroactive Plan Creation, Living Task Tree, .plan/ Is the Task Tracker, User Feedback and Changing the Task Tree, Remember.\n- [`CLAUDE.md`](CLAUDE.md) \u2014 Added \u00a7Terminology section with the \"plan is the verb\" convention.\n- [`skills/task-system/references/planning.md`](skills/task-system/references/planning.md) \u2014 Added terminology pointer at the top, referencing CLAUDE.md \u00a7Terminology.\n\n### Key Design Decisions\n\n- **Terminology authority chain:** CLAUDE.md \u00a7Terminology is the project-wide canonical source. SKILL.md \u00a7Overview carries the full convention (owning skill \u2014 shapes every word choice in the file). planning.md points to CLAUDE.md.\n- **`## Decisions` removal is scoped:** This task drops `## Decisions` from the SKILL.md (no longer created in Phase 3, no longer logged in the change protocol). The deeper removal from `planning.md` (\u00a7User Decisions Log, \u00a7Field-by-Field Notes, \u00a7Root task.md Anatomy) is owned by the `revision-notes` sibling task.\n- **Phase 3 merges old Phase 3 + Phase 4.** The old file-structure and task-decomposition phases were artificially split; the new Phase 3 covers artifact pipeline mapping, task structure, creation, and dependencies in one coherent section.\n- **Phase 4 adds user review gate.** The old Self-Review section is now Phase 4 with an explicit user-review step before commit \u2014 the task tree is presented to the user for approval, not auto-committed.\n",

const md = window.markdownit({ html: false, linkify: true });
let currentView = 'tree';
const taskByPath = {};
const expandedTasks = new Set();
const expandedSections = new Set();

/* ── Helpers ── */

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sanitizeMermaid(s) {
  return s.replace(/"/g, "'").replace(/[\[\](){}]/g, '');
}

function flattenTasks(task) {
  let r = [task];
  for (const c of task.children) r = r.concat(flattenTasks(c));
  return r;
}

function buildIndex(task) {
  taskByPath[task.path] = task;
  for (const c of task.children) buildIndex(c);
}

function parseBodySections(body) {
  const lines = body.split('\n');
  const sections = [];
  let cur = null;
  for (const line of lines) {
    const m = line.match(/^## (.+)$/);
    if (m) {
      if (cur) sections.push(cur);
      cur = { name: m[1], content: '' };
    } else if (cur) {
      cur.content += line + '\n';
    }
  }
  if (cur) sections.push(cur);
  return sections;
}

function sectionPreview(content) {
  const stripped = content.replace(/\n/g, ' ').replace(/[#*`>\-]/g, '').trim();
  if (!stripped) return '';
  return stripped.length > 80 ? stripped.slice(0, 80) + '...' : stripped;
}

function taskMatches(task, status, search) {
  if (status && task.effective_status !== status) return false;
  if (search && !(task.title || '').toLowerCase().includes(search) &&
      !(task.path || '').toLowerCase().includes(search)) return false;
  return true;
}

function anyDescendantMatches(task, status, search) {
  if (taskMatches(task, status, search)) return true;
  for (const c of task.children) {
    if (anyDescendantMatches(c, status, search)) return true;
  }
  return false;
}

/* ── Init ── */

function init() {
  document.documentElement.setAttribute('data-theme',
    localStorage.getItem('dashboard-theme') || 'light');
  mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  buildIndex(TASK_DATA);
  renderSummary();
  renderTree();
}

/* ── Theme ── */

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('dashboard-theme', next);
}

/* ── View switching ── */

function showView(view) {
  currentView = view;
  document.querySelectorAll('.hc-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('btn-' + view).classList.add('active');
  document.getElementById('view-tree').classList.toggle('hidden', view !== 'tree');
  document.getElementById('view-dag').classList.toggle('hidden', view !== 'dag');
  document.getElementById('view-kanban').classList.toggle('hidden', view !== 'kanban');
  if (view === 'dag') renderDag();
  if (view === 'kanban') renderKanban();
}

/* ── Summary bar ── */

function renderSummary() {
  const all = flattenTasks(TASK_DATA);
  const leaves = all.filter(function(t) { return t.is_leaf; });
  const approved = leaves.filter(function(t) { return t.effective_status === 'approved'; }).length;
  const pct = leaves.length ? Math.round(100 * approved / leaves.length) : 0;

  document.getElementById('plan-title').textContent = TASK_DATA.title || 'Plan Dashboard';
  document.getElementById('stat-tasks').innerHTML =
    '<strong>' + leaves.length + '</strong> tasks, <strong>' + (all.length - leaves.length) + '</strong> groups';
  document.getElementById('stat-approved').innerHTML =
    '<strong>' + approved + '/' + leaves.length + '</strong> approved';
  document.getElementById('progress-fill').style.width = pct + '%';
  const dates = all.map(function(t) { return t.updated; }).filter(Boolean).sort();
  if (dates.length) {
    document.getElementById('stat-updated').textContent = dates[dates.length - 1];
  }
}

/* ── Tree view (recursive expand/collapse) ── */

function renderTree() {
  const root = document.getElementById('view-tree');
  root.innerHTML = '';
  for (var i = 0; i < TASK_DATA.children.length; i++) {
    root.appendChild(renderTaskNode(TASK_DATA.children[i], 0));
  }
}

function renderTaskNode(task, depth) {
  const node = document.createElement('div');
  node.className = 'task-node';
  node.dataset.path = task.path;

  /* ── Row (always visible) ── */
  const row = document.createElement('div');
  row.className = 'task-row';

  const hasExpandable = task.children.length > 0 || (task.body && task.body.trim());
  const toggle = document.createElement('span');
  toggle.className = 'task-toggle' + (hasExpandable ? '' : ' leaf');
  toggle.textContent = '\u25B8';

  const slug = document.createElement('span');
  slug.className = 'task-slug';
  const slugText = task.path ? task.path.split('/').pop() : '';
  slug.textContent = slugText;

  const titleSpan = document.createElement('span');
  titleSpan.className = 'task-title-text';
  titleSpan.textContent = task.title || '';

  const badge = document.createElement('span');
  badge.className = 'badge badge-' + task.effective_status;
  badge.textContent = task.effective_status;

  row.appendChild(toggle);
  if (slugText) row.appendChild(slug);
  row.appendChild(titleSpan);
  row.appendChild(badge);

  if (!task.is_leaf && task.children.length) {
    const approvedCount = task.children.filter(function(c) { return c.effective_status === 'approved'; }).length;
    const prog = document.createElement('span');
    prog.className = 'task-progress';
    prog.textContent = '(' + approvedCount + '/' + task.children.length + ')';
    row.appendChild(prog);
  }

  node.appendChild(row);

  /* ── Body (expandable) ── */
  const body = document.createElement('div');
  body.className = 'task-body';

  const sections = parseBodySections(task.body || '');
  const sectionKeys = ['Objective', 'Results', 'Decisions', 'Review Notes'];
  const shownSections = sections.filter(function(s) { return sectionKeys.indexOf(s.name) >= 0 && s.content.trim(); });
  const otherSections = sections.filter(function(s) { return sectionKeys.indexOf(s.name) < 0 && s.content.trim(); });
  var allSections = shownSections.concat(otherSections);

  for (var si = 0; si < allSections.length; si++) {
    (function(sec) {
      var secKey = task.path + '::' + sec.name;
      var secDiv = document.createElement('div');

      var secToggle = document.createElement('div');
      secToggle.className = 'section-toggle';
      var secIcon = document.createElement('span');
      secIcon.className = 'section-icon';
      secIcon.textContent = '\u25B8';
      var secLabel = document.createElement('span');
      secLabel.className = 'section-label';
      secLabel.textContent = sec.name;
      var secPreview = document.createElement('span');
      secPreview.className = 'section-preview';
      secPreview.textContent = sectionPreview(sec.content);

      secToggle.appendChild(secIcon);
      secToggle.appendChild(secLabel);
      secToggle.appendChild(secPreview);

      var secContent = document.createElement('div');
      secContent.className = 'section-content';
      var rendered = document.createElement('div');
      rendered.className = 'rendered-md';

      secToggle.onclick = function(e) {
        e.stopPropagation();
        var isOpen = secContent.classList.toggle('open');
        secIcon.classList.toggle('expanded', isOpen);
        if (isOpen) {
          expandedSections.add(secKey);
          if (!rendered.innerHTML) {
            rendered.innerHTML = md.render(sec.content);
          }
          secPreview.style.display = 'none';
        } else {
          expandedSections.delete(secKey);
          secPreview.style.display = '';
        }
      };

      secContent.appendChild(rendered);
      secDiv.appendChild(secToggle);
      secDiv.appendChild(secContent);
      body.appendChild(secDiv);
    })(allSections[si]);
  }

  /* Metadata pills */
  var hasMeta = (task.depends_on && task.depends_on.length) ||
                task.script ||
                (task.tags && task.tags.length) ||
                (task.input && task.input.length) ||
                (task.output && task.output.length);
  if (hasMeta) {
    var metaDiv = document.createElement('div');
    metaDiv.className = 'task-meta';
    if (task.depends_on && task.depends_on.length) {
      var pill = document.createElement('span');
      pill.className = 'meta-pill';
      pill.innerHTML = '<strong>depends:</strong> ' + task.depends_on.map(function(d) { return esc(d); }).join(', ');
      metaDiv.appendChild(pill);
    }
    if (task.script) {
      var pill2 = document.createElement('span');
      pill2.className = 'meta-pill';
      pill2.innerHTML = '<strong>script:</strong> ' + esc(task.script);
      metaDiv.appendChild(pill2);
    }
    if (task.tags && task.tags.length) {
      var pill3 = document.createElement('span');
      pill3.className = 'meta-pill';
      pill3.innerHTML = '<strong>tags:</strong> ' + task.tags.map(function(t) { return esc(t); }).join(', ');
      metaDiv.appendChild(pill3);
    }
    if (task.input && task.input.length) {
      var pill4 = document.createElement('span');
      pill4.className = 'meta-pill';
      pill4.innerHTML = '<strong>in:</strong> ' + task.input.map(function(x) { return esc(x); }).join(', ');
      metaDiv.appendChild(pill4);
    }
    if (task.output && task.output.length) {
      var pill5 = document.createElement('span');
      pill5.className = 'meta-pill';
      pill5.innerHTML = '<strong>out:</strong> ' + task.output.map(function(x) { return esc(x); }).join(', ');
      metaDiv.appendChild(pill5);
    }
    body.appendChild(metaDiv);
  }

  node.appendChild(body);

  /* ── Children (recursive) ── */
  if (task.children.length) {
    var childrenDiv = document.createElement('div');
    childrenDiv.className = 'task-children';
    if (!expandedTasks.has(task.path)) childrenDiv.style.display = 'none';
    for (var ci = 0; ci < task.children.length; ci++) {
      childrenDiv.appendChild(renderTaskNode(task.children[ci], depth + 1));
    }
    node.appendChild(childrenDiv);
  }

  /* Restore expanded state on re-render */
  if (expandedTasks.has(task.path)) {
    toggle.classList.add('expanded');
    body.classList.add('open');
  }

  /* ── Click handler ── */
  (function(taskRef, toggleEl, bodyEl, nodeEl) {
    row.onclick = function(e) {
      e.stopPropagation();
      var isExpanded = expandedTasks.has(taskRef.path);
      if (isExpanded) {
        expandedTasks.delete(taskRef.path);
        toggleEl.classList.remove('expanded');
        bodyEl.classList.remove('open');
        var ch = nodeEl.querySelector(':scope > .task-children');
        if (ch) ch.style.display = 'none';
      } else {
        expandedTasks.add(taskRef.path);
        toggleEl.classList.add('expanded');
        bodyEl.classList.add('open');
        var ch2 = nodeEl.querySelector(':scope > .task-children');
        if (ch2) ch2.style.display = '';
      }
    };
  })(task, toggle, body, node);

  return node;
}

/* ── Filters ── */

function applyFilters() {
  var status = document.getElementById('filter-status').value;
  var search = document.getElementById('search-box').value.toLowerCase();
  document.querySelectorAll('.task-node').forEach(function(el) {
    var path = el.dataset.path || '';
    var task = taskByPath[path];
    if (!task) { el.style.display = ''; return; }
    var visible = anyDescendantMatches(task, status, search);
    el.style.display = visible ? '' : 'none';
  });
}

/* ── DAG view ── */

async function renderDag() {
  var container = document.getElementById('view-dag');
  var task = TASK_DATA;

  if (!task.children.length) {
    container.innerHTML = '<p style="color:var(--text-mute)">No subtasks to visualize.</p>';
    return;
  }

  var statusColors = {
    'not-started': '#e0e0e0', 'in-progress': '#bbdefb',
    'implemented': '#fff9c4', 'revise': '#ffcdd2', 'approved': '#c8e6c9'
  };

  var mermaidCode = 'graph LR\n';
  var allTasks = flattenTasks(task).filter(function(t) { return t.path; });
  for (var i = 0; i < allTasks.length; i++) {
    var child = allTasks[i];
    var s = child.effective_status;
    var color = statusColors[s] || '#e0e0e0';
    var nodeId = child.path.replace(/[^a-zA-Z0-9_]/g, '_');
    mermaidCode += '    ' + nodeId + '["' + sanitizeMermaid(child.title || child.path) + '"]\n';
    mermaidCode += '    style ' + nodeId + ' fill:' + color + '\n';
  }
  for (var j = 0; j < allTasks.length; j++) {
    var ch = allTasks[j];
    var childId = ch.path.replace(/[^a-zA-Z0-9_]/g, '_');
    for (var k = 0; k < ch.depends_on.length; k++) {
      var depId = ch.depends_on[k].replace(/[^a-zA-Z0-9_]/g, '_');
      mermaidCode += '    ' + depId + ' --> ' + childId + '\n';
    }
  }

  container.innerHTML = '<div class="dag-controls">' +
    '<strong>Dependency Graph:</strong> ' + esc(task.title || 'root') + '</div>' +
    '<div class="mermaid">' + mermaidCode + '</div>';

  try {
    await mermaid.run({ nodes: container.querySelectorAll('.mermaid') });
  } catch(e) {
    container.innerHTML += '<p style="color:var(--st-rev-t);margin-top:8px">DAG render error: ' + esc(e.message) + '</p>';
  }
}

/* ── Kanban view ── */

function renderKanban() {
  var container = document.getElementById('view-kanban');
  container.innerHTML = '';
  var statuses = ['not-started', 'in-progress', 'implemented', 'revise', 'approved'];
  var labels = {
    'not-started': 'Not Started', 'in-progress': 'In Progress',
    'implemented': 'Implemented', 'revise': 'Revise', 'approved': 'Approved'
  };
  var all = flattenTasks(TASK_DATA).filter(function(t) { return t.is_leaf && t.path; });

  for (var i = 0; i < statuses.length; i++) {
    var st = statuses[i];
    var col = document.createElement('div');
    col.className = 'kanban-col';
    var tasks = all.filter(function(t) { return t.effective_status === st; });
    col.innerHTML = '<div class="kanban-col-header">' + labels[st] +
      ' <span class="count">' + tasks.length + '</span></div>';
    for (var j = 0; j < tasks.length; j++) {
      (function(t) {
        var card = document.createElement('div');
        card.className = 'kanban-card';
        card.innerHTML = '<div class="kanban-card-title">' + esc(t.title || t.path) + '</div>' +
          '<div class="kanban-card-path">' + esc(t.path) + '</div>';
        card.onclick = function() { showView('tree'); expandToPath(t.path); };
        col.appendChild(card);
      })(tasks[j]);
    }
    container.appendChild(col);
  }
}

function expandToPath(path) {
  var parts = path.split('/');
  var accumulated = '';
  for (var i = 0; i < parts.length; i++) {
    accumulated = i === 0 ? parts[i] : accumulated + '/' + parts[i];
    expandedTasks.add(accumulated);
  }
  renderTree();
  requestAnimationFrame(function() {
    var el = document.querySelector('.task-node[data-path="' + path + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
